<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>李清照行迹 · Cinematic Journey</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" crossorigin="" />
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: #05070b; font-family: system-ui, sans-serif; overflow: hidden; }
    #map { position: absolute; inset: 0; }

    /* ── Timeline HUD (top-left) ── */
    #tlHud {
      position: absolute; z-index: 3;
      top: max(10px, calc(env(safe-area-inset-top, 0px) + 10px));
      left: max(10px, calc(env(safe-area-inset-left, 0px) + 10px));
      max-width: min(420px, 86vw);
      padding: 10px 13px 12px;
      border: 1px solid rgba(73, 95, 118, 0.62);
      border-radius: 10px;
      background: rgba(6, 10, 18, 0.78);
      box-shadow: 0 4px 18px rgba(0,0,0,0.35);
      color: #e2ecf5;
      pointer-events: none;
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      transition: border-color 0.35s, box-shadow 0.35s;
    }
    #tlHud.transition-hit {
      border-color: rgba(255,209,102,0.92);
      box-shadow: 0 0 0 1px rgba(255,209,102,0.25), 0 0 24px rgba(255,209,102,0.18);
    }
    #tlYear { font-size: 17px; font-weight: 800; color: #ffd166; margin-bottom: 4px; letter-spacing: 0.02em; line-height: 1.2; }
    #tlEvent { font-size: 14px; line-height: 1.45; color: #d6e6f7; }
    #tlPoetryHint {
      margin-top: 6px;
      font-size: 12px; line-height: 1.5; color: #b388ff;
      font-family: "Kaiti SC","STKaiti","KaiTi","Songti SC",serif;
      font-style: italic; display: none;
    }
    #tlPoetryHint.active { display: block; }

    /* ── Deed popup (bottom-right, avoid poetry card) ── */
    #dkPop {
      position: absolute; z-index: 4;
      right: max(10px, calc(env(safe-area-inset-right, 0px) + 10px));
      bottom: calc(max(env(safe-area-inset-bottom, 0px), 10px) + 10px);
      transform: translateY(40px);
      width: min(360px, 88vw); max-height: 32vh;
      overflow-y: auto; -webkit-overflow-scrolling: touch;
      padding: 14px 18px;
      border: 1px solid rgba(240,98,146,0.48);
      border-radius: 14px;
      background: rgba(7, 11, 20, 0.88);
      box-shadow: 0 10px 40px rgba(0,0,0,0.45), 0 0 0 1px rgba(240,98,146,0.06);
      color: #e6edf3;
      transition: opacity 0.4s cubic-bezier(0.22,1,0.36,1), transform 0.4s cubic-bezier(0.22,1,0.36,1);
      opacity: 0; pointer-events: none;
      scrollbar-width: thin; scrollbar-color: rgba(240,98,146,0.2) transparent;
    }
    #dkPop::-webkit-scrollbar { width: 4px; }
    #dkPop::-webkit-scrollbar-thumb { background: rgba(240,98,146,0.25); border-radius: 4px; }
    #dkPop.show { opacity: 1; transform: translateY(0); }
    #dkPop .dk-place {
      font-size: 18px; font-weight: 800; color: #f06292;
      margin-bottom: 4px; text-shadow: 0 0 10px rgba(240,98,146,0.25);
    }
    #dkPop .dk-year {
      font-size: 13px; font-weight: 700; color: #90caf9;
      margin-bottom: 8px; letter-spacing: 0.03em;
    }
    #dkPop .dk-body {
      font-size: 15px; line-height: 1.68; color: rgba(220,230,245,0.92);
      white-space: pre-wrap; font-family: "Kaiti SC","STKaiti","KaiTi","Songti SC",serif;
    }

    /* ── Poetry glass card (bottom-left, like a floating scroll) ── */
    #pmCard {
      position: absolute; z-index: 4;
      bottom: calc(max(env(safe-area-inset-bottom, 0px), 10px) + 10px);
      left: max(10px, calc(env(safe-area-inset-left, 0px) + 10px));
      max-width: min(280px, calc(100vw - 24px));
      padding: 14px 16px 16px;
      border: 1px solid rgba(240,98,146,0.5);
      border-radius: 14px;
      background: rgba(10, 14, 24, 0.9);
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      backdrop-filter: blur(14px) saturate(1.2); -webkit-backdrop-filter: blur(14px) saturate(1.2);
      font-family: "Kaiti SC","STKaiti","KaiTi","Songti SC",serif;
      pointer-events: auto;
      transform: translateY(14px);
      transition: opacity 0.45s cubic-bezier(0.22,1,0.36,1), transform 0.45s cubic-bezier(0.22,1,0.36,1);
      opacity: 0; visibility: hidden;
    }
    #pmCard.visible { opacity: 1; visibility: visible; transform: translateY(0); }
    #pmCard .pm-scroll { max-height: min(48vh, 380px); overflow-y: auto; -webkit-overflow-scrolling: touch; scrollbar-width: thin; scrollbar-color: rgba(240,98,146,0.2) transparent; padding-right: 4px; }
    #pmCard .pm-scroll::-webkit-scrollbar { width: 4px; }
    #pmCard .pm-scroll::-webkit-scrollbar-thumb { background: rgba(240,98,146,0.25); border-radius: 4px; }
    #pmCard .pm-era {
      font-size: 11px; font-weight: 700; color: #f06292;
      letter-spacing: 0.06em; margin-bottom: 6px; font-family: system-ui, sans-serif; flex-shrink: 0;
    }
    #pmCard .pm-title {
      font-size: 16px; font-weight: 800; color: #e1bee7;
      margin-bottom: 10px; line-height: 1.4; text-shadow: 0 0 12px rgba(240,98,146,0.25); flex-shrink: 0;
    }
    #pmCard .pm-body {
      font-size: 14.5px; line-height: 2; color: rgba(230,225,240,0.92);
      white-space: pre-wrap; word-break: keep-all; letter-spacing: 0.04em;
    }

    /* ── Place-label Marker (HTML, KaiTi, crisp & readable) ── */
    .wp-lbl {
      font-family: "Kaiti SC","STKaiti","KaiTi","Songti SC","FangSong",serif;
      font-size: 20px; font-weight: 800; line-height: 1.2;
      color: #f5f0e8;
      text-shadow: 0 1px 3px rgba(0,0,0,0.82), 0 0 1px rgba(0,0,0,0.6);
      background: rgba(10,15,24,0.65);
      padding: 2px 8px; border-radius: 4px;
      white-space: nowrap; pointer-events: none; user-select: none;
      transition: opacity 0.6s ease, filter 0.6s ease, transform 0.55s cubic-bezier(0.22,1,0.36,1);
    }
    .wp-lbl.wp-off { visibility: hidden; opacity: 0; filter: none; transform: translateY(0); }
    .wp-lbl.wp-revealing { visibility: visible; opacity: 0; filter: blur(10px); transform: translateY(5px); }
    .wp-lbl.wp-on { visibility: visible; opacity: 1; filter: blur(0); transform: translateY(0); }
    .wp-lbl.wp-noprog { transition: none !important; }

    /* ── Dynasty-map watermarks (large semi-transparent KaiTi) ── */
    .dyn-wm {
      font-family: "Kaiti SC","STKaiti","KaiTi","Songti SC",serif;
      font-size: 42px; font-weight: 600; letter-spacing: 0.18em;
      color: rgba(200,210,220,0.28);
      text-shadow: 0 0 12px rgba(255,255,255,0.85), 0 0 22px rgba(255,255,255,0.7), 0 1px 3px rgba(255,255,255,0.65);
      pointer-events: none; user-select: none; white-space: nowrap;
      transition: opacity 0.45s ease, visibility 0.45s ease;
    }
    .dyn-wm.dyn-hidden { visibility: hidden; opacity: 0; }

    /* ── Mini play/pause button (right edge, subtle) ── */
    #miniPlay {
      position: absolute; z-index: 5;
      right: max(10px, calc(env(safe-area-inset-right, 0px) + 10px));
      top: max(10px, calc(env(safe-area-inset-top, 0px) + 10px));
      width: 28px; height: 28px;
      border: 1px solid rgba(120,155,195,0.3);
      border-radius: 6px;
      background: rgba(6,10,18,0.55);
      color: rgba(200,215,230,0.7);
      font-size: 13px; line-height: 26px;
      text-align: center; cursor: pointer;
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
      transition: background 0.2s, color 0.2s, border-color 0.2s;
      user-select: none; padding: 0; margin: 0;
    }
    #miniPlay:hover { background: rgba(20,30,50,0.7); color: #fff; border-color: rgba(160,190,220,0.5); }

    #miniProgress {
      position: absolute; z-index: 5;
      right: max(48px, calc(env(safe-area-inset-right, 0px) + 48px));
      top: calc(max(10px, calc(env(safe-area-inset-top, 0px) + 10px)) + 5px);
      width: clamp(80px, 16vw, 180px); height: 14px;
      border-radius: 3px; background: rgba(120,155,195,0.15);
      overflow: hidden; cursor: pointer;
      display: flex; align-items: center;
    }
    #miniProgress .progress-fill {
      height: 4px; width: 0%;
      background: linear-gradient(90deg, rgba(240,98,146,0.6), rgba(240,98,146,0.9));
      border-radius: 2px; transition: width 0.3s ease; pointer-events: none;
    }
    #miniProgress:hover { background: rgba(120,155,195,0.28); }
  </style>
</head>
<body>

  <div id="tlHud" aria-live="polite">
    <div id="tlYear">公元 1084 年</div>
    <div id="tlEvent">李清照生于章丘，诗书自华。</div>
    <div id="tlPoetryHint"></div>
  </div>
  <div id="map" aria-label="李清照行迹地图"></div>
  <div id="dkPop" aria-live="polite">
    <div id="dkPlace" class="dk-place"></div>
    <div id="dkYear" class="dk-year"></div>
    <div id="dkBody" class="dk-body"></div>
  </div>
  <div id="pmCard" aria-live="polite" aria-label="李清照作品">
    <div class="pm-scroll" id="pmScroll"></div>
  </div>
  <button id="miniPlay" title="播放 / 暂停">▶</button>
  <div id="miniProgress"><div class="progress-fill" id="progFill"></div></div>

  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js" crossorigin=""></script>
  <script>
(function () {
  "use strict";

  /* ── URL params (video export mode) ── */
  const qp = new URLSearchParams(location.search);
  const IS_VIDEO_EXPORT = qp.get("video") === "1";

  /* ================================================================
     CONSTANTS
     ================================================================ */
  const DYNASTY_URL    = "data/hartwell_dynasty_outlines.json";
  const TRAJ_URL       = "data/trajectories.json";
  const LIQZ_NAME      = "李清照";

  const SONG_BLEND_LO  = 1127;
  const SONG_BLEND_HI  = 1128;
  const HIT_YEAR       = 1127;
  const HIT_WINDOW     = 2.2;

  const COMET_LEN      = 18;
  const SEG_MS_BASE    = 5800;
  const SEG_MS_SHORT   = 2000;
  const SEG_MS_LONG    = 11000;

  const DEED_MS        = 3400;
  const DEED_MS_SHORT  = 1400;

  const PANORAMA_EASE  = 3400;
  const PANORAMA_HOLD  = 4600;
  const LOOP_GAP_MS    = 2800;

  const POEM_MS_MIN    = 8000;
  const POEM_MS_MAX    = 16000;

  const POETRY_TRIGGERS = [
    { year: 1099, items: [
      { t:"如梦令·常记溪亭日暮", e:"约 1099 年", b:"常记溪亭日暮，沉醉不知归路。兴尽晚回舟，误入藕花深处。争渡，争渡，惊起一滩鸥鹭。" },
      { t:"如梦令·昨夜雨疏风骤", e:"约 1099 年", b:"昨夜雨疏风骤，浓睡不消残酒。试问卷帘人，却道海棠依旧。知否，知否？应是绿肥红瘦。" },
    ]},
    { year: 1101, items: [
      { t:"醉花阴·薄雾浓云愁永昼", e:"约 1101—1120 年", b:"薄雾浓云愁永昼，瑞脑销金兽。佳节又重阳，玉枕纱厨，半夜凉初透。\n东篱把酒黄昏后，有暗香盈袖。莫道不销魂，帘卷西风，人比黄花瘦。" },
    ]},
    { year: 1127, items: [
      { t:"夏日绝句", e:"1127 年", b:"生当作人杰，死亦为鬼雄。\n至今思项羽，不肯过江东。" },
    ]},
    { year: 1132, items: [
      { t:"声声慢·寻寻觅觅", e:"约 1129—1132 年", b:"寻寻觅觅，冷冷清清，凄凄惨惨戚戚。乍暖还寒时候，最难将息。三杯两盏淡酒，怎敌他、晚来风急？雁过也，正伤心，却是旧时相识。\n满地黄花堆积。憔悴损，如今有谁堪摘？守着窗儿，独自怎生得黑？梧桐更兼细雨，到黄昏、点点滴滴。这次第，怎一个愁字了得！" },
    ]},
    { year: 1135, items: [
      { t:"武陵春·春晚", e:"1135 年", b:"风住尘香花已尽，日晚倦梳头。物是人非事事休，欲语泪先流。\n闻说双溪春尚好，也拟泛轻舟。只恐双溪舴艋舟，载不动许多愁。" },
    ]},
  ];

  const EVENTS = [
    { y:1084, t:"李清照生于章丘，诗书自华。" },
    { y:1101, t:"与赵明诚成婚，金石书画相契相知。" },
    { y:1127, t:"靖康之变，北宋覆亡，南渡序幕开启。" },
    { y:1129, t:"赵明诚卒于建康，清照孤旅深愁。" },
    { y:1134, t:"整理旧藏与文稿，词风沉郁深婉。" },
    { y:1155, t:"晚岁寓居临安附近，清照词名传后世。" },
  ];

  /* ================================================================
     STATE
     ================================================================ */
  const S = {
    map: null,
    waypoints: [],
    wYrs: [],
    dynasty: null,
    dynastyReady: false,
    borderSplit: false,
    simYear: 0,
    walkLine: [],
    walkRaw: [],
    cometHist: [],
    wmMarkers: {},
    wpMarkers: [],
    poetryQueue: [],
    poetryTimer: null,
    poetrySeen: new Set(),
    poetryPrevYf: null,
    isFirstRun: true,
    allPoets: [],
    migBuckets: null,
    migRaf: null,
    migPhase: 0,
    paused: false,
    totalSegs: 0,
    doneSegs: 0,
    pauseResolve: null,
    seekTo: -1,
    cancelAnim: false,
  };

  /* ================================================================
     DOM refs
     ================================================================ */
  const dom = {
    tlHud:   document.getElementById("tlHud"),
    tlYear:  document.getElementById("tlYear"),
    tlEvent: document.getElementById("tlEvent"),
    tlHint:  document.getElementById("tlPoetryHint"),
    dkPop:   document.getElementById("dkPop"),
    dkPlace: document.getElementById("dkPlace"),
    dkYear:  document.getElementById("dkYear"),
    dkBody:  document.getElementById("dkBody"),
    pmCard:  document.getElementById("pmCard"),
    pmScroll: document.getElementById("pmScroll"),
    miniPlay: document.getElementById("miniPlay"),
    progFill: document.getElementById("progFill"),
  };

  /* ================================================================
     UTILS
     ================================================================ */
  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
  function lerp(a, b, t) { return a + (b - a) * t; }
  function dist(a, b) { return Math.hypot(a[0] - b[0], a[1] - b[1]); }
  function ease(t) { return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2; }
  function wait(ms) { return new Promise(function (r) { setTimeout(r, ms); }); }
  function pauseAwareWait(ms) {
    return new Promise(function (r) {
      /* Check frequently for unpause */
      function tick(remaining) {
        if (S.paused) {
          S.pauseResolve = function () { tick(remaining); };
          return;
        }
        if (remaining <= 0) { r(); return; }
        var step = Math.min(remaining, 120);
        setTimeout(function () { tick(remaining - step); }, step);
      }
      tick(ms);
    });
  }
  function setProgBar(pct) {
    if (dom.progFill) dom.progFill.style.width = Math.round(pct * 100) + "%";
  }
  function easeTo(opts) {
    return new Promise(function (r) {
      S.map.easeTo(Object.assign({ essential: true }, opts));
      S.map.once("moveend", r);
    });
  }
  function emptyFC() { return { type: "FeatureCollection", features: [] }; }
  function setSrc(id, data) { var s = S.map.getSource(id); if (s) s.setData(data); }
  function nearestEvent(y) {
    var t = EVENTS[0].t, ey = EVENTS[0].y;
    for (var i = 0; i < EVENTS.length; i++) { if (EVENTS[i].y <= y) { t = EVENTS[i].t; ey = EVENTS[i].y; } else break; }
    return { y: ey, t: t };
  }
  function trimDetail(t) {
    if (!t) return "";
    return String(t).split(/\n/).map(function (l) {
      return l.replace(/^[,，、\s]+/, "").trim();
    }).filter(Boolean).join("\n");
  }
  function bezierCtrl(ax, ay, bx, by) {
    var mx = (ax + bx) / 2, my = (ay + by) / 2;
    var dx = by - ay, dy = -(bx - ax);
    var len = Math.hypot(dx, dy);
    if (len < 1e-9) return [mx, my];
    var bend = Math.min(0.38, Math.hypot(bx - ax, by - ay) * 0.13);
    return [mx + (dx / len) * bend, my + (dy / len) * bend];
  }
  function bezierPt(p0, p1, p2, t) {
    var u = 1 - t;
    return [u * u * p0[0] + 2 * u * t * p1[0] + t * t * p2[0],
            u * u * p0[1] + 2 * u * t * p1[1] + t * t * p2[1]];
  }

  /* ================================================================
     DEED POPUP
     ================================================================ */
  function showDeed(idx) {
    var w = S.waypoints[idx];
    dom.dkPlace.textContent = w.label || "";
    dom.dkYear.textContent = "公元 " + w.year + " 年";
    dom.dkBody.textContent = trimDetail(w.detail) || "行经此地，史志略载。";
    dom.dkPop.classList.add("show");
  }
  function hideDeed() { dom.dkPop.classList.remove("show"); }

  /* ================================================================
     TIMELINE HUD
     ================================================================ */
  function updateTlHud(y) {
    var yi = Math.floor(y);
    var ev = nearestEvent(yi);
    dom.tlYear.textContent = "公元 " + yi + " 年";
    dom.tlEvent.textContent = "公元 " + ev.y + " — " + ev.t;
    dom.tlHud.classList.toggle("transition-hit", Math.abs(y - HIT_YEAR) <= HIT_WINDOW);
  }

  /* ================================================================
     POETRY CARD
     ================================================================ */
  function clearPoemTimer() {
    if (S.poetryTimer != null) { clearTimeout(S.poetryTimer); S.poetryTimer = null; }
  }
  function hidePoemCard() {
    dom.pmCard.classList.remove("visible");
    dom.tlHint.classList.remove("active");
  }
  function renderPoemCard(item) {
    dom.pmScroll.textContent = "";
    var e = document.createElement("div"); e.className = "pm-era"; e.textContent = item.e || ""; dom.pmScroll.appendChild(e);
    var t = document.createElement("div"); t.className = "pm-title"; t.textContent = item.t || ""; dom.pmScroll.appendChild(t);
    var b = document.createElement("div"); b.className = "pm-body"; b.textContent = item.b || ""; dom.pmScroll.appendChild(b);
    dom.pmCard.classList.add("visible");
    dom.tlHint.textContent = "✦ 正展：" + (item.t || "");
    dom.tlHint.classList.add("active");
  }
  function showNextPoem() {
    clearPoemTimer();
    if (!S.poetryQueue.length) { hidePoemCard(); return; }
    var item = S.poetryQueue.shift();
    renderPoemCard(item);
    var ms = POEM_MS_MIN + Math.random() * (POEM_MS_MAX - POEM_MS_MIN);
    S.poetryTimer = setTimeout(function () { S.poetryTimer = null; showNextPoem(); }, ms);
  }
  function tryShowPoetry() {
    if (!S.poetryQueue.length) return;
    if (dom.pmCard.classList.contains("visible")) return;
    showNextPoem();
  }
  function enqueuePoetryCrossing(prevYf, yf) {
    if (prevYf == null || yf <= prevYf) return;
    for (var i = 0; i < POETRY_TRIGGERS.length; i++) {
      var trig = POETRY_TRIGGERS[i];
      if (trig.year > prevYf && trig.year <= yf && !S.poetrySeen.has(trig.year)) {
        S.poetrySeen.add(trig.year);
        for (var j = 0; j < trig.items.length; j++) S.poetryQueue.push(trig.items[j]);
      }
    }
    tryShowPoetry();
  }
  function unfirePoetryBeyond(yf) {
    for (var i = 0; i < POETRY_TRIGGERS.length; i++) {
      if (POETRY_TRIGGERS[i].year > yf) S.poetrySeen.delete(POETRY_TRIGGERS[i].year);
    }
  }
  function abortPoetry() {
    clearPoemTimer();
    S.poetryQueue.length = 0;
    hidePoemCard();
  }

  /* ================================================================
     DYNASTY OVERLAYS
     ================================================================ */
  function snapHasBorderSplit(sn) {
    return !!(sn && sn.borderHard && sn.borderHard.features && sn.borderHard.features.length &&
              sn.borderSoft && sn.borderSoft.features && sn.borderSoft.features.length);
  }
  function snapHasChinaFade(sn) {
    return !!(sn && sn.borderChinaFade && sn.borderChinaFade.features && sn.borderChinaFade.features.length);
  }
  function addDynastyLayers(bundle) {
    var ns = bundle.snapshots.chin1080, ss = bundle.snapshots.chin1200;
    if (!ns || !ss) return;
    var nGeo = ns.geo, sGeo = ss.geo;
    if (!nGeo || !sGeo || !nGeo.features || !sGeo.features) return;
    var bis = snapHasBorderSplit(ns) && snapHasBorderSplit(ss);
    S.borderSplit = bis;

    S.map.addSource("north-geo", { type:"geojson", data:nGeo });
    S.map.addSource("south-geo", { type:"geojson", data:sGeo });

    S.map.addLayer({ id:"north-fill", type:"fill", source:"north-geo",
      paint:{ "fill-color":["coalesce",["get","fill"],"#78909c"], "fill-opacity":0.085 } });
    if (bis && snapHasChinaFade(ns)) {
      S.map.addSource("north-cfade", { type:"geojson", data:ns.borderChinaFade });
      S.map.addLayer({ id:"north-cfade-fill", type:"fill", source:"north-cfade",

  function blendDynasty(y) {

    var fMax = 0.085, lMax = 0.58;
    var map = S.map;
    if (map.getLayer("north-fill")) map.setPaintProperty("north-fill","fill-opacity", fMax * (1 - u));
    if (map.getLayer("south-fill")) map.setPaintProperty("south-fill","fill-opacity", fMax * u);
    var nL = lMax * (1 - u) + 0.12 * u, sL = 0.12 * (1 - u) + lMax * u;
    if (S.borderSplit) {
      if (map.getLayer("north-line-hard")) map.setPaintProperty("north-line-hard","line-opacity", nL * 0.96);
      if (map.getLayer("north-line-soft")) map.setPaintProperty("north-line-soft","line-opacity", nL * 0.24);
      if (map.getLayer("south-line-hard")) map.setPaintProperty("south-line-hard","line-opacity", sL * 0.96);
      if (map.getLayer("south-line-soft")) map.setPaintProperty("south-line-soft","line-opacity", sL * 0.24);
      if (map.getLayer("north-cfade-fill")) map.setPaintProperty("north-cfade-fill","fill-opacity", 0.055 * (1 - u) + 0.02 * u);
      if (map.getLayer("south-cfade-fill")) map.setPaintProperty("south-cfade-fill","fill-opacity", 0.02 * (1 - u) + 0.055 * u);
    } else {
      if (map.getLayer("north-line")) map.setPaintProperty("north-line","line-opacity", nL);

  /* ================================================================
     WATERMARKS (regime labels)
     ================================================================ */
  function findFcCenterByDyn(fc, dk) {
    if (!fc || !fc.features) return null;
    for (var i = 0; i < fc.features.length; i++) {
      var f = fc.features[i];
      if (f.properties && f.properties.dynastyKey === dk && f.geometry && f.geometry.coordinates) {
        return geomCenter(f.geometry.coordinates);
      }
    }
    return null;
  }
  function geomCenter(coords) {
    if (!coords || !coords.length) return null;
    if (typeof coords[0] === "number") return coords;
    var sums = [0,0], cnt = 0;
    (function walk(arr) {
      for (var i = 0; i < arr.length; i++) {
        if (typeof arr[i] === "number") { sums[0] += arr[0]; sums[1] += arr[1]; cnt++; return; }
        walk(arr[i]);
      }
    })(coords);
    return cnt ? [sums[0] / cnt, sums[1] / cnt] : coords[0] && coords[0][0] ? coords[0][0] : coords[0];
  }
  function addWatermarkMarkers(bundle) {
    ["bei","liao","xixia","nan","jin"].forEach(function (k) { if (S.wmMarkers[k]) { S.wmMarkers[k].remove(); delete S.wmMarkers[k]; } });

    var rows = [
      { id:"bei", snap:"chin1080", dk:"song dynasty", text:"北宋" },
      { id:"liao", snap:"chin1080", dk:"liao dynasty", text:"辽" },
      { id:"xixia1", snap:"chin1080", dk:"xixia", text:"西夏" },
      { id:"nan", snap:"chin1200", dk:"song dynasty", text:"南宋" },
      { id:"jin", snap:"chin1200", dk:"jin dynasty", text:"金" },
      { id:"xixia2", snap:"chin1200", dk:"xixia", text:"西夏" },
    ];
    rows.forEach(function (r) {
      var sn = bundle.snapshots[r.snap] && bundle.snapshots[r.snap].geo;
      var pt = findFcCenterByDyn(sn, r.dk);
      if (!pt) return;
      var el = document.createElement("div");
      el.className = "dyn-wm dyn-hidden";

      var mk = new maplibregl.Marker({ element:el, anchor:"center" }).setLngLat(pt).addTo(S.map);

  /* ================================================================
     ROUTE RENDERING (bezier arc line + comet + current-point)
     ================================================================ */
  function bezierSmoothCoords(raw) {
    if (!raw || raw.length < 2) return raw.slice();
    var out = [];
    for (var i = 0; i < raw.length - 1; i++) {
      var a = raw[i], b = raw[i + 1];
      var cp = bezierCtrl(a[0], a[1], b[0], b[1]);
      var steps = Math.max(6, Math.round(Math.hypot(b[0] - a[0], b[1] - a[1]) * 14));
      for (var s = 0; s <= steps; s++) {
        var t = s / steps;
        var pt = bezierPt(a, cp, b, t);
        if (s === 0 && i > 0 && out.length > 0) {
          /* skip duplicate start point when chaining */
        } else {
          out.push(pt);
        }
      }
    }
    return out;
  }
  function updateWalkLineSrc() {
    if (!S.map.getSource("walked-line")) return;
    if (S.walkRaw.length < 2) { setSrc("walked-line", emptyFC()); return; }
    var curved = bezierSmoothCoords(S.walkRaw);
    var fc = { type:"FeatureCollection", features:[
      { type:"Feature", properties:{}, geometry:{ type:"LineString", coordinates:curved } }
    ]};
    setSrc("walked-line", fc);
  }
  function appendWalkSeg(fromLng, fromLat, toLng, toLat) {
    var c = S.walkRaw;
    if (!c.length) { c.push([fromLng, fromLat]); }
    var last = c[c.length-1];
    if (dist(last, [fromLng, fromLat]) > 1e-8) c.push([fromLng, fromLat]);
    if (dist(c[c.length-1], [toLng, toLat]) > 1e-8) c.push([toLng, toLat]);
    updateWalkLineSrc();
  }
  function buildCometFc(h) {
    var n = h.length; if (!n) return emptyFC();
    var feats = [];
    for (var i = 0; i < n; i++) {
      var u = n === 1 ? 1 : i / (n - 1);
      var head = i === n - 1 ? 1 : 0;
      var o = head ? clamp(0.06 + 0.32 * u + 0.34, 0, 0.94) : 0.06 + 0.32 * u;
      var r = 1.6 + 4.8 * u; if (head) r = Math.max(r + 1.1, 6.4);
      feats.push({ type:"Feature", properties:{ o:o, r:r, head:head },
        geometry:{ type:"Point", coordinates:h[i].slice() } });
    }
    return { type:"FeatureCollection", features:feats };
  }
  function pushComet(lng, lat) {
    var h = S.cometHist;
    var last = h[h.length-1];
    if (last && Math.hypot(last[0]-lng, last[1]-lat) < 1e-9) return;
    h.push([lng, lat]);
    while (h.length > COMET_LEN) h.shift();
    setSrc("mover-comet", buildCometFc(h));
  }
  function updateMoverPoint(lng, lat) {
    setSrc("mover-point", { type:"FeatureCollection", features:[
      { type:"Feature", properties:{}, geometry:{ type:"Point", coordinates:[lng, lat] } }
    ]});
  }

  /* ================================================================
     BASEMAP LABEL TRIM
     ================================================================ */
  function trimBasemapLabels() {
    var st = S.map.getStyle();
    if (!st || !st.layers) return;
    st.layers.forEach(function (ly) {
      if (ly.type !== "symbol") return;
      var idl = ly.id.toLowerCase();
      var hide = idl.includes("place") || idl.includes("settlement") ||
        idl.includes("poi") || idl.includes("road") || idl.includes("water") ||
        idl.includes("country_label") || idl.includes("state_label") ||
        idl.includes("label") || idl.includes("housenumber") ||
        idl.includes("airport") || idl.includes("park") || idl.includes("natural");
      if (hide) { try { S.map.setLayoutProperty(ly.id, "visibility", "none"); } catch (_) {} }
    });
  }

  /* ================================================================
     MIGRATION FLOW (contemporary scholars southward wave)
     ================================================================ */
  function buildMigBuckets(poets) {
    var buckets = new Map();
    for (var pi = 0; pi < poets.length; pi++) {
      var poet = poets[pi];
      if (poet.name === LIQZ_NAME) continue;
      var wps = poet.waypoints;
      if (!Array.isArray(wps) || wps.length < 2) continue;
      for (var wi = 0; wi < wps.length - 1; wi++) {
        var a = wps[wi], b = wps[wi + 1];
        if (typeof a.lng !== "number" || typeof a.lat !== "number" || typeof b.lng !== "number" || typeof b.lat !== "number") continue;
        var d = dist([a.lng, a.lat], [b.lng, b.lat]);
        var south = a.lat - b.lat;
        if (d < 0.35 || south < 0.2 || a.lat < 30) continue;
        var moveYear = typeof b.yearStart === "number" ? b.yearStart : a.yearStart;
        if (!isFinite(moveYear) || moveYear < 980 || moveYear > 1220) continue;
        moveYear = Math.floor(moveYear);
        if (!buckets.has(moveYear)) buckets.set(moveYear, []);
        buckets.get(moveYear).push({
          a: [a.lng, a.lat], b: [b.lng, b.lat],
          o: clamp(0.28 + south * 0.55 + d * 0.06, 0.15, 1),
        });
      }
    }
    return buckets;
  }
  function stopMigFlow() {
    if (S.migRaf != null) { cancelAnimationFrame(S.migRaf); S.migRaf = null; }
    S.migPhase = 0;
    tickMigFlow._last = 0;
    setSrc("mig-flow", emptyFC());
  }
  function tickMigFlow(now) {
    if (!S.migBuckets || S.migBuckets.size === 0) { S.migRaf = requestAnimationFrame(tickMigFlow); return; }
    var src = S.map.getSource("mig-flow");
    if (!src) { S.migRaf = requestAnimationFrame(tickMigFlow); return; }
    S.migRaf = requestAnimationFrame(tickMigFlow);
    var last = tickMigFlow._last || now;
    var dt = clamp((now - last) / 1000, 0, 0.12);
    tickMigFlow._last = now;
    if (dt < 1e-6) return;
    var y = Math.floor(S.simYear);
    var yLo = Math.max(960, y - 38);
    var segs = [];
    for (var yy = yLo; yy <= y; yy++) {
      var rows = S.migBuckets.get(yy);
      if (!rows) continue;
      var fade = 1 - (y - yy) / 38;
      for (var ri = 0; ri < rows.length; ri++) {
        var r = rows[ri];
        segs.push({ a: r.a, b: r.b, o: r.o * clamp(fade, 0.06, 1) });
        if (segs.length >= 320) break;
      }
      if (segs.length >= 320) break;
    }
    if (!segs.length) { setSrc("mig-flow", emptyFC()); return; }
    var boost = clamp(1 - Math.abs(S.simYear - HIT_YEAR) / 3.2, 0, 1);
    var speed = 0.018 + boost * 0.015;
    S.migPhase = (S.migPhase + speed * dt) % 1;
    var n = clamp(Math.max(80, segs.length), 80, Math.round(280 * (1 + boost * 0.52)));
    var feats = [];
    var half = Math.max(1, Math.round(n * 0.35));
    for (var i = 0; i < n; i++) {
      var seg = segs[i % segs.length];
      var t = (S.migPhase + i / n) % 1;
      var pt = [lerp(seg.a[0], seg.b[0], t), lerp(seg.a[1], seg.b[1], t)];
      var isHot = boost > 0.2 ? 1 : 0;
      var o = clamp(seg.o * (0.75 + boost * 0.55), 0.06, 0.68);
      feats.push({ type:"Feature", properties:{ o:o, hot:isHot },
        geometry:{ type:"Point", coordinates:pt } });
    }
    setSrc("mig-flow", { type:"FeatureCollection", features:feats });
  }
  tickMigFlow._last = 0;
  function startMigFlow() {
    if (S.migRaf != null) return;
    tickMigFlow._last = performance.now();
    S.migRaf = requestAnimationFrame(tickMigFlow);
  }

  /* ================================================================
     ANIMATION (per-segment + deed at each waypoint)
     ================================================================ */
  function animateSegment(a, b, segMs) {
    return new Promise(function (resolve) {
      var t0 = performance.now();
      var midLng = (a.lng + b.lng) / 2, midLat = (a.lat + b.lat) / 2;
      var sp = dist([a.lng, a.lat], [b.lng, b.lat]);
      var z = sp > 2.2 ? 5.55 : sp > 1.0 ? 6.1 : 6.65;
      easeTo({ center:[midLng, midLat], zoom:z, pitch:clamp(62 - S.walkLine.length * 0.25, 38, 70), bearing:mapGetBearing(), duration:900 }).then(function () {
        var prevPoetryYf = S.poetryPrevYf == null ? a.year : S.poetryPrevYf;
        function frame() {
          if (S.cancelAnim) return;
          if (S.paused) { S.pauseResolve = function () { requestAnimationFrame(frame); }; return; }
          var u = clamp((performance.now() - t0) / segMs, 0, 1);
          var t = ease(u);
          var lng = lerp(a.lng, b.lng, t), lat = lerp(a.lat, b.lat, t);
          var sy = lerp(a.year, b.year, t);
          S.simYear = sy;
          updateTlHud(sy);
          blendDynasty(sy);
          pushComet(lng, lat);
          updateMoverPoint(lng, lat);

          var yf = Math.floor(sy);
          if (prevPoetryYf != null && yf > prevPoetryYf) {
            enqueuePoetryCrossing(prevPoetryYf, yf);
          }
          prevPoetryYf = yf;

          if (u < 1) { requestAnimationFrame(frame); } else {
            pushComet(b.lng, b.lat);
            updateMoverPoint(b.lng, b.lat);
            S.poetryPrevYf = yf;
            appendWalkSeg(a.lng, a.lat, b.lng, b.lat);
            S.simYear = b.year;
            blendDynasty(b.year);
            resolve();
          }
        }
        requestAnimationFrame(frame);
      });
    });
  }
  function mapGetBearing() { try { return S.map.getBearing(); } catch (_) { return 0; } }

  async function runSequence() {
    /* Reset visual state */
    hidePoemCard(); clearPoemTimer(); abortPoetry();
    S.poetrySeen.clear(); S.poetryPrevYf = null;
    hideDeed(); hideAllWpLabels();
    S.walkLine.length = 0; S.walkRaw.length = 0; updateWalkLineSrc();
    S.cometHist.length = 0; setSrc("mover-comet", emptyFC());
    setSrc("mover-point", emptyFC());
    setSrc("mig-flow", emptyFC());
    S.migPhase = 0;
    S.doneSegs = 0;
    S.totalSegs = S.waypoints.length - 1;
    S.seekTo = -1;
    S.cancelAnim = false;
    setProgBar(0);

    var w = S.waypoints;
    var y0 = w[0].year;
    S.simYear = y0;
    updateTlHud(y0);
    blendDynasty(y0);

    /* Intro zoom to birth city */
    await easeTo({ center:[w[0].lng, w[0].lat], zoom:10.2, pitch:78, bearing:38, duration:3600 });
    pushComet(w[0].lng, w[0].lat);
    updateMoverPoint(w[0].lng, w[0].lat);
    S.walkRaw.push([w[0].lng, w[0].lat]); updateWalkLineSrc();
    revealWpLabel(0);
    showDeed(0);
    await pauseAwareWait(DEED_MS);
    hideDeed();

    /* Rise to overview */
    await easeTo({ center:[117.2,35.4], zoom:6.2, pitch:62, bearing:-18, duration:2800 });

    /* Loop through segments */
    var i = 0;
    while (i < w.length - 1) {
      if (S.seekTo >= 0) {
        var tgt = S.seekTo; S.seekTo = -1;
        S.cancelAnim = true;
        await pauseAwareWait(20); /* let current anim frame bail */
        S.cancelAnim = false;
        i = Math.min(tgt, w.length - 2);
        /* Rewind visual state to target segment */
        S.walkRaw.length = 0;
        S.cometHist.length = 0;
        hideAllWpLabels();
        hideDeed();
        if (i >= 0) {
          S.walkRaw.push([w[0].lng, w[0].lat]);
          for (var j = 0; j < i; j++) {
            appendWalkSeg(w[j].lng, w[j].lat, w[j+1].lng, w[j+1].lat);
          }
          /* Set sim to the start of target segment */
          S.simYear = w[i].year;
          S.poetryPrevYf = Math.floor(w[i].year);
          updateTlHud(S.simYear);
          blendDynasty(S.simYear);
          updateMoverPoint(w[i].lng, w[i].lat);
          pushComet(w[i].lng, w[i].lat);
          S.doneSegs = i;
          setProgBar(i / S.totalSegs);
        }
        continue;
      }
      var a = w[i], b = w[i+1];
      var yGap = b.year - a.year;
      var segMs = yGap < 2 ? SEG_MS_SHORT : yGap > 10 ? SEG_MS_LONG : SEG_MS_BASE;
      await animateSegment(a, b, segMs);
      S.doneSegs = i + 1; setProgBar(S.doneSegs / S.totalSegs);
      revealWpLabel(i + 1);
      var deedMs = (i + 1 < w.length - 1 && w[i+1].year === w[i+2].year) ? DEED_MS_SHORT : DEED_MS;
      showDeed(i + 1);
      await pauseAwareWait(deedMs);
      hideDeed();
      i++;
    }

    /* Final zoom onto last city */
    var lw = w[w.length - 1];
    await easeTo({ center:[lw.lng, lw.lat], zoom:8.8, pitch:58, bearing:14, duration:2400 });
    pushComet(lw.lng, lw.lat);
    updateMoverPoint(lw.lng, lw.lat);
    revealWpLabel(w.length - 1);
    showDeed(w.length - 1);
    await pauseAwareWait(DEED_MS);
    hideDeed();
    await pauseAwareWait(600);
    setProgBar(1);

    /* Panorama pull-out */
    var pts = w.map(function (wp) { return [wp.lng, wp.lat]; });
    var bnd = [[Infinity,Infinity],[-Infinity,-Infinity]];
    pts.forEach(function (p) { bnd[0][0]=Math.min(bnd[0][0],p[0]); bnd[0][1]=Math.min(bnd[0][1],p[1]); bnd[1][0]=Math.max(bnd[1][0],p[0]); bnd[1][1]=Math.max(bnd[1][1],p[1]); });
    bnd[0][0] -= 0.5; bnd[0][1] -= 0.5; bnd[1][0] += 0.5; bnd[1][1] += 0.5;
    await new Promise(function (r) {
      S.map.once("moveend", r);
      S.map.fitBounds(bnd, { padding:{top:80, bottom:100, left:30, right:30}, maxZoom:6.05, pitch:26, bearing:-12, duration:PANORAMA_EASE, essential:true });
    });
    await wait(PANORAMA_HOLD);
  }

  /* ================================================================
     MAIN INIT
     ================================================================ */
  async function init() {
    /* Fetch trajectories & extract 李清照 waypoints */
    var tr, dy;
    try { var r1 = await fetch(TRAJ_URL); tr = r1.ok ? await r1.json() : null; } catch (_) { tr = null; }
    if (!tr || !tr.poets) { document.body.textContent = "加载轨迹数据失败"; return; }
    var p = tr.poets.find(function (x) { return x.name === LIQZ_NAME; });
    if (!p || !p.waypoints || !p.waypoints.length) { document.body.textContent = "未找到李清照航点数据"; return; }

    S.waypoints = p.waypoints.map(function (wp) {
      var label = String(wp.place || "").replace(/\(出生地\)/, "").trim();
      return {
        lng: wp.lng, lat: wp.lat,
        year: wp.yearStart, yearEnd: wp.yearEnd,
        label: label, detail: String(wp.detail_text || ""),
      };
    });
    S.wYrs = S.waypoints.map(function (w) { return w.year; });

    /* Fetch dynasty bundle */
    try { var r2 = await fetch(DYNASTY_URL); dy = r2.ok ? await r2.json() : null; } catch (_) { dy = null; }
    S.dynasty = dy;

    /* Build MapLibre map */
    S.map = new maplibregl.Map({
      container: "map",
      style: "https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json",
      center: [S.waypoints[0].lng, S.waypoints[0].lat],
      zoom: 5.4, pitch: 0, bearing: 0, maxPitch: 85,
      attributionControl: true,
    });

    S.map.addControl(new maplibregl.NavigationControl({ visualizePitch:true }), "top-right");

    await new Promise(function (r) { S.map.once("load", r); });

    /* Add dynasty layers */
    if (dy && dy.snapshots) { addDynastyLayers(dy); addWatermarkMarkers(dy); }

    /* Add route sources + layers (above dynasty) */
    S.map.addSource("walked-line", { type:"geojson", data:emptyFC() });
    S.map.addLayer({ id:"walked-line-layer", type:"line", source:"walked-line",
      layout:{"line-cap":"round","line-join":"round"},
      paint:{"line-color":"#f06292","line-width":3.2,"line-opacity":0.44,"line-blur":0.6} });
    S.map.addLayer({ id:"walked-line-glow", type:"line", source:"walked-line",
      layout:{"line-cap":"round","line-join":"round"},
      paint:{"line-color":"#f06292","line-width":9,"line-opacity":0.12,"line-blur":2.4} });

    S.map.addSource("mover-comet", { type:"geojson", data:emptyFC() });
    S.map.addLayer({ id:"mover-comet-circles", type:"circle", source:"mover-comet",
      paint:{
        "circle-radius":["get","r"],
        "circle-color":["case",["==",["get","head"],1],"#ff5d73","#90a4ae"],
        "circle-opacity":["get","o"],
        "circle-stroke-width":["case",["==",["get","head"],1],1.2,0.5],
        "circle-stroke-color":["case",["==",["get","head"],1],"rgba(255,255,255,0.78)","rgba(255,255,255,0.40)"],
        "circle-stroke-opacity":["get","o"],
      } });

    S.map.addSource("mover-point", { type:"geojson", data:emptyFC() });
    S.map.addLayer({ id:"mover-point-c", type:"circle", source:"mover-point",
      paint:{"circle-radius":7.8,"circle-color":"#ff6b8d","circle-opacity":0.92,
        "circle-stroke-width":2.2,"circle-stroke-color":"#fff","circle-stroke-opacity":0.86} });
    S.map.addLayer({ id:"mover-point-glow", type:"circle", source:"mover-point",
      paint:{"circle-radius":16,"circle-color":"rgba(240,98,146,0.5)","circle-opacity":0.38,
        "circle-blur":3,"circle-stroke-width":0} });

    S.map.addSource("mig-flow", { type:"geojson", data:emptyFC() });
    S.map.addLayer({ id:"mig-flow-dots", type:"circle", source:"mig-flow",
      paint:{
        "circle-radius":["case",["==",["get","hot"],1],1.8,1.15],
        "circle-color":["case",["==",["get","hot"],1],"#64ffda","#4dd0e1"],
        "circle-opacity":["get","o"],
        "circle-blur":0.25,
        "circle-stroke-width":0.25,
        "circle-stroke-color":["case",["==",["get","hot"],1],"rgba(220,255,245,0.6)","rgba(180,240,255,0.45)"],
        "circle-stroke-opacity":["get","o"],
      } });

    /* Trim labels + init place markers */
    trimBasemapLabels();
    initPlaceLabels();

    /* Build migration flow data */
    if (tr && tr.poets) { S.migBuckets = buildMigBuckets(tr.poets); }
    startMigFlow();

    /* Wire mini play/pause */
    var miniP = document.getElementById("miniPlay");
    var progWrap = document.getElementById("miniProgress");
    if (IS_VIDEO_EXPORT) {
      miniP.style.display = "none";
      progWrap.style.display = "none";
    }
    miniP.onclick = function () {
      S.paused = !S.paused;
      miniP.textContent = S.paused ? "▶" : "⏸";
      if (!S.paused && S.pauseResolve) {
        var r = S.pauseResolve; S.pauseResolve = null; r();
      }
    };

    /* Progress bar: click to seek */
    var progBar = document.getElementById("miniProgress");
    function progClick(e) {
      var rect = progBar.getBoundingClientRect();
      var pct = clamp((e.clientX - rect.left) / rect.width, 0, 1);
      var segIdx = Math.round(pct * (S.waypoints.length - 1));
      S.seekTo = segIdx;
      if (S.paused && S.pauseResolve) {
        var r = S.pauseResolve; S.pauseResolve = null; r();
        S.paused = false;
        miniP.textContent = "⏸";
      }
    }
    var dragActive = false;
    progBar.addEventListener("mousedown", function (e) { dragActive = true; progClick(e); });
    window.addEventListener("mousemove", function (e) { if (dragActive) progClick(e); });
    window.addEventListener("mouseup", function () { dragActive = false; });

    /* Begin loop */
    S.map.once("idle", async function () {
      if (IS_VIDEO_EXPORT) {
        /* One-shot video export */
        try { await runSequence(); } catch (e) { console.warn("runSequence error", e); }
        /* Final hold then signal done */
        await wait(3000);
        window.__POET_VIZ_DONE__ = true;
        return;
      }
      for (;;) {
        try { await runSequence(); } catch (e) { console.warn("runSequence error", e); await wait(2000); }
        await wait(LOOP_GAP_MS);
      }
    });
  }

  init().catch(function (e) {
    console.error("Init failed", e);
    document.body.textContent = "初始化失败: " + (e.message || String(e));
  });
})();
  </script>
</body>
</html>
