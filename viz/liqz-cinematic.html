<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>李清照导演版 · Cinematic Migration</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" crossorigin="" />
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: #05070b; font-family: system-ui, sans-serif; }
    #map { position: fixed; inset: 0; }
    #cinematicHud {
      position: fixed;
      z-index: 4;
      top: calc(env(safe-area-inset-top, 0px) + 10px);
      left: max(10px, env(safe-area-inset-left, 0px));
      width: min(420px, 86vw);
      padding: 10px 12px 11px;
      border: 1px solid rgba(75, 96, 120, 0.65);
      border-radius: 10px;
      background: rgba(6, 10, 18, 0.78);
      color: #e5edf6;
      box-shadow: 0 6px 22px rgba(0, 0, 0, 0.35);
      transition: box-shadow 0.35s ease, border-color 0.35s ease;
      pointer-events: none;
    }
    #cinematicHud.hit {
      border-color: rgba(255, 209, 102, 0.9);
      box-shadow: 0 0 0 1px rgba(255, 209, 102, 0.25), 0 0 28px rgba(255, 209, 102, 0.2);
    }
    #hudYear { font-size: 18px; color: #ffd166; font-weight: 800; margin-bottom: 4px; letter-spacing: 0.02em; }
    #hudEvent { font-size: 14px; line-height: 1.42; color: #d6e5f5; }
    #deed {
      position: fixed;
      z-index: 4;
      left: 50%;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 14px);
      transform: translateX(-50%) translateY(120%);
      width: min(460px, 90vw);
      max-height: 40vh;
      overflow: auto;
      padding: 12px 14px;
      border: 1px solid rgba(255, 107, 141, 0.48);
      border-radius: 12px;
      background: rgba(7, 11, 20, 0.86);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.42);
      color: #e6edf3;
      transition: opacity 0.35s ease, transform 0.35s ease;
      opacity: 0;
      pointer-events: none;
    }
    #deed.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #deedPlace { font-size: 18px; color: #ff6b8d; font-weight: 800; margin-bottom: 4px; }
    #deedYear { font-size: 13px; color: #90caf9; font-weight: 700; margin-bottom: 8px; }
    #deedBody { font-size: 16px; line-height: 1.62; white-space: pre-wrap; }
    @media (max-aspect-ratio: 10/16) {
      #cinematicHud { width: min(360px, 84vw); }
      #hudYear { font-size: 17px; }
      #hudEvent { font-size: 13px; }
      #deedBody { font-size: 15px; }
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="cinematicHud" aria-live="polite">
    <div id="hudYear">公元 1084 年</div>
    <div id="hudEvent">李清照生于章丘，书香门第中长成。</div>
  </div>
  <div id="deed" aria-live="polite">
    <div id="deedPlace"></div>
    <div id="deedYear"></div>
    <div id="deedBody"></div>
  </div>
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js" crossorigin=""></script>
  <script>
    (function () {
      const WAYPOINTS = [
        { lng: 117.532344, lat: 36.685415, label: "章丘（出生地）", year: 1084, detail: "父格非官郓州教授。" },
        { lng: 114.313904, lat: 34.802941, label: "开封", year: 1096, detail: "父格非官太学正，随父居京师。" },
        { lng: 118.440962, lat: 36.778223, label: "益都", year: 1112, detail: "24岁至38岁间，家世与学养持续沉淀。" },
        { lng: 118.802891, lat: 32.064735, label: "南京", year: 1128, detail: "南渡初期，离乱之中词境转深。" },
        { lng: 120.586673, lat: 30.036519, label: "绍兴", year: 1132, detail: "迁徙渐稳，作品风格由清丽转沉郁。" },
        { lng: 120.161693, lat: 30.280059, label: "杭州", year: 1155, detail: "晚岁寓居临安一带，词名流传后世。" },
      ];
      const EVENT_CUES = [
        { year: 1084, text: "李清照生于章丘，书香门第中长成。" },
        { year: 1101, text: "与赵明诚成婚，金石书画相契相知。" },
        { year: 1127, text: "靖康之变，北宋覆亡，南渡序幕开启。" },
        { year: 1128, text: "辗转江宁，家国离乱深刻进入词境。" },
        { year: 1129, text: "赵明诚卒于建康，个人命运急转。" },
        { year: 1132, text: "至越地后，行迹渐稳而词风益深。" },
        { year: 1155, text: "晚岁定居临安附近，余韵入史。" },
      ];
      const SEGMENT_MS = [8000, 8000, 12000, 9000, 9000];
      const PAUSE_MS = [1400, 1000, 1800, 1000, 1200, 1800];
      const LOOP_GAP_MS = 3200;
      const TRANSITION_YEAR = 1127;
      const MIGRATION_URL = "data/trajectories.json";

      const map = new maplibregl.Map({
        container: "map",
        style: "https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json",
        center: [116.4, 33.2],
        zoom: 5.7,
        pitch: 55,
        bearing: -8,
        maxPitch: 85,
        attributionControl: true,
      });
      map.addControl(new maplibregl.NavigationControl({ visualizePitch: true }), "top-right");

      const hud = document.getElementById("cinematicHud");
      const hudYear = document.getElementById("hudYear");
      const hudEvent = document.getElementById("hudEvent");
      const deed = document.getElementById("deed");
      const deedPlace = document.getElementById("deedPlace");
      const deedYear = document.getElementById("deedYear");
      const deedBody = document.getElementById("deedBody");

      const walked = [];
      let walkedPhase = 0;
      let walkedRaf = null;
      let migrationBuckets = null;
      let migrationSegments = [];
      let migrationRaf = null;
      let migrationPhase = 0;
      let playbackYear = WAYPOINTS[0].year;
      let transitionPulseDone = false;
      const cometTrail = [];

      function clamp(v, lo, hi) { return Math.min(hi, Math.max(lo, v)); }
      function lerp(a, b, t) { return a + (b - a) * t; }
      function ease(t) { return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2; }
      function dist(a, b) { return Math.hypot(a[0] - b[0], a[1] - b[1]); }

      function nearestEvent(year) {
        let text = EVENT_CUES[0].text;
        for (let i = 0; i < EVENT_CUES.length; i++) {
          if (EVENT_CUES[i].year <= year) text = EVENT_CUES[i].text;
          else break;
        }
        return text;
      }

      function updateHud(yearFloat) {
        playbackYear = yearFloat;
        const year = Math.floor(yearFloat);
        hudYear.textContent = "公元 " + year + " 年";
        hudEvent.textContent = nearestEvent(year);
        hud.classList.toggle("hit", Math.abs(yearFloat - TRANSITION_YEAR) <= 2.2);
      }

      function showDeed(wp) {
        deedPlace.textContent = wp.label;
        deedYear.textContent = "公元 " + wp.year + " 年";
        deedBody.textContent = wp.detail;
        deed.classList.add("show");
      }
      function hideDeed() { deed.classList.remove("show"); }

      function emptyFC() { return { type: "FeatureCollection", features: [] }; }

      function setSource(id, data) {
        const src = map.getSource(id);
        if (src) src.setData(data);
      }

      function addWalkedPoint(lng, lat) {
        const last = walked[walked.length - 1];
        if (last && last[0] === lng && last[1] === lat) return;
        walked.push([lng, lat]);
      }
      function resetCometTrail() { cometTrail.length = 0; }
      function pushCometTrail(lng, lat) {
        const last = cometTrail[cometTrail.length - 1];
        if (last && last[0] === lng && last[1] === lat) return;
        cometTrail.push([lng, lat]);
        while (cometTrail.length > 16) cometTrail.shift();
      }
      function renderCometTrail() {
        if (!cometTrail.length) {
          setSource("hero-comet", emptyFC());
          return;
        }
        const n = cometTrail.length;
        const feats = [];
        for (let i = 0; i < n; i++) {
          const u = n === 1 ? 1 : i / (n - 1);
          const isHead = i === n - 1 ? 1 : 0;
          feats.push({
            type: "Feature",
            properties: {
              r: isHead ? 7.4 : 2 + 4.1 * u,
              o: isHead ? 0.96 : 0.1 + 0.58 * u,
              head: isHead,
            },
            geometry: { type: "Point", coordinates: cometTrail[i] },
          });
        }
        setSource("hero-comet", { type: "FeatureCollection", features: feats });
      }

      function polyMetric(coords) {
        const lens = [];
        let total = 0;
        for (let i = 0; i < coords.length - 1; i++) {
          const d = dist(coords[i], coords[i + 1]);
          lens.push(d); total += d;
        }
        return { lens, total };
      }

      function pointOnPolyline(coords, lens, s) {
        if (coords.length < 2 || lens.length === 0) return coords[0] || [0, 0];
        let t = s; let acc = 0;
        for (let i = 0; i < lens.length; i++) {
          if (acc + lens[i] >= t) {
            const r = lens[i] < 1e-8 ? 1 : (t - acc) / lens[i];
            return [lerp(coords[i][0], coords[i + 1][0], r), lerp(coords[i][1], coords[i + 1][1], r)];
          }
          acc += lens[i];
        }
        return coords[coords.length - 1];
      }

      function tickWalked(now) {
        const met = polyMetric(walked);
        if (met.total < 1e-6) { walkedRaf = requestAnimationFrame(tickWalked); return; }
        const last = tickWalked._last || now;
        const dt = Math.min(0.1, Math.max(0, (now - last) / 1000));
        tickWalked._last = now;
        walkedPhase = (walkedPhase + 0.046 * dt) % 1;
        const count = clamp(Math.round(met.total / 0.16), 56, 420);
        const feats = [];
        for (let i = 0; i < count; i++) {
          const u = (walkedPhase + i / count) % 1;
          const p = pointOnPolyline(walked, met.lens, u * met.total);
          feats.push({ type: "Feature", properties: {}, geometry: { type: "Point", coordinates: p } });
        }
        setSource("hero-flow", { type: "FeatureCollection", features: feats });
        walkedRaf = requestAnimationFrame(tickWalked);
      }
      tickWalked._last = 0;

      function buildMigrationBuckets(data) {
        const m = new Map();
        if (!data || !Array.isArray(data.poets)) return m;
        for (const poet of data.poets) {
          if (!poet || poet.name === "李清照" || !Array.isArray(poet.waypoints)) continue;
          for (let i = 0; i < poet.waypoints.length - 1; i++) {
            const a = poet.waypoints[i], b = poet.waypoints[i + 1];
            if (!a || !b || typeof a.lng !== "number" || typeof a.lat !== "number" || typeof b.lng !== "number" || typeof b.lat !== "number") continue;
            const year = Math.floor(typeof b.yearStart === "number" ? b.yearStart : (typeof a.yearEnd === "number" ? a.yearEnd : a.yearStart));
            if (!isFinite(year) || year < 980 || year > 1220) continue;
            const south = a.lat - b.lat;
            if (a.lat < 31 || south < 0.22 || dist([a.lng, a.lat], [b.lng, b.lat]) < 0.42) continue;
            if (!m.has(year)) m.set(year, []);
            m.get(year).push({ a: [a.lng, a.lat], b: [b.lng, b.lat], o: clamp(0.35 + south * 0.65, 0.2, 1) });
          }
        }
        return m;
      }

      function refreshMigrationSegments(yearFloat) {
        if (!migrationBuckets) return;
        const y = Math.floor(yearFloat);
        const yLo = Math.max(960, y - 32);
        const segs = [];
        for (let yy = yLo; yy <= y; yy++) {
          const rows = migrationBuckets.get(yy);
          if (!rows) continue;
          const fade = 1 - (y - yy) / 32;
          for (const r of rows) {
            segs.push({ a: r.a, b: r.b, o: r.o * clamp(fade, 0.08, 1) });
            if (segs.length >= 260) break;
          }
          if (segs.length >= 260) break;
        }
        migrationSegments = segs;
      }

      function tickMigration(now) {
        if (!migrationSegments.length) { migrationRaf = requestAnimationFrame(tickMigration); return; }
        const last = tickMigration._last || now;
        const dt = Math.min(0.1, Math.max(0, (now - last) / 1000));
        tickMigration._last = now;
        const boost = clamp(1 - Math.abs(playbackYear - TRANSITION_YEAR) / 3.2, 0, 1);
        migrationPhase = (migrationPhase + (0.022 * (1 + boost * 0.55)) * dt) % 1;
        const maxN = Math.round(280 * (1 + boost * 0.42));
        const n = clamp(Math.max(120, migrationSegments.length), 120, maxN);
        const feats = [];
        for (let i = 0; i < n; i++) {
          const seg = migrationSegments[i % migrationSegments.length];
          const t = (migrationPhase + i / n) % 1;
          const p = [lerp(seg.a[0], seg.b[0], t), lerp(seg.a[1], seg.b[1], t)];
          feats.push({
            type: "Feature",
            properties: { o: clamp(seg.o * (0.9 + boost * 0.42), 0.14, 0.84), hot: boost > 0.2 ? 1 : 0 },
            geometry: { type: "Point", coordinates: p },
          });
        }
        setSource("era-flow", { type: "FeatureCollection", features: feats });
        migrationRaf = requestAnimationFrame(tickMigration);
      }
      tickMigration._last = 0;

      function wait(ms) { return new Promise((r) => setTimeout(r, ms)); }
      function easeTo(opts) { return new Promise((r) => { map.easeTo(Object.assign({ essential: true }, opts)); map.once("moveend", r); }); }
      async function transitionPulse(center) {
        await easeTo({
          center,
          zoom: map.getZoom() + 0.35,
          pitch: clamp(map.getPitch() + 5, 0, 80),
          bearing: map.getBearing() - 4,
          duration: 540,
        });
        await easeTo({
          center,
          zoom: map.getZoom() - 0.42,
          pitch: clamp(map.getPitch() - 4, 0, 80),
          bearing: map.getBearing() + 3,
          duration: 620,
        });
      }

      async function animateSegment(a, b, ms) {
        const t0 = performance.now();
        const midLng = (a.lng + b.lng) / 2;
        const midLat = (a.lat + b.lat) / 2;
        const span = dist([a.lng, a.lat], [b.lng, b.lat]);
        const z = span > 2.2 ? 5.55 : span > 1 ? 6.1 : 6.65;
        await easeTo({ center: [midLng, midLat], zoom: z, pitch: 62, bearing: -12, duration: 900 });
        await new Promise((resolve) => {
          function frame() {
            const u = clamp((performance.now() - t0) / ms, 0, 1);
            const t = ease(u);
            const lng = lerp(a.lng, b.lng, t);
            const lat = lerp(a.lat, b.lat, t);
            const y = lerp(a.year, b.year, t);
            updateHud(y);
            refreshMigrationSegments(y);
            addWalkedPoint(lng, lat);
            pushCometTrail(lng, lat);
            renderCometTrail();
            if (u < 1) requestAnimationFrame(frame);
            else resolve();
          }
          requestAnimationFrame(frame);
        });
      }

      async function runSequence() {
        walked.length = 0;
        walkedPhase = 0;
        transitionPulseDone = false;
        resetCometTrail();
        hideDeed();
        setSource("hero-flow", emptyFC());
        setSource("hero-comet", emptyFC());
        updateHud(WAYPOINTS[0].year);
        refreshMigrationSegments(WAYPOINTS[0].year);
        await easeTo({ center: [WAYPOINTS[0].lng, WAYPOINTS[0].lat], zoom: 9.9, pitch: 75, bearing: 30, duration: 3200 });
        addWalkedPoint(WAYPOINTS[0].lng, WAYPOINTS[0].lat);
        showDeed(WAYPOINTS[0]);
        await wait(PAUSE_MS[0]);
        hideDeed();
        for (let i = 0; i < WAYPOINTS.length - 1; i++) {
          await animateSegment(WAYPOINTS[i], WAYPOINTS[i + 1], SEGMENT_MS[i]);
          if (!transitionPulseDone && WAYPOINTS[i].year < TRANSITION_YEAR && WAYPOINTS[i + 1].year >= TRANSITION_YEAR) {
            transitionPulseDone = true;
            await transitionPulse([WAYPOINTS[i + 1].lng, WAYPOINTS[i + 1].lat]);
          }
          showDeed(WAYPOINTS[i + 1]);
          await wait(PAUSE_MS[i + 1]);
          hideDeed();
        }
        const bounds = WAYPOINTS.reduce((acc, w) => {
          acc[0][0] = Math.min(acc[0][0], w.lng); acc[0][1] = Math.min(acc[0][1], w.lat);
          acc[1][0] = Math.max(acc[1][0], w.lng); acc[1][1] = Math.max(acc[1][1], w.lat);
          return acc;
        }, [[Infinity, Infinity], [-Infinity, -Infinity]]);
        await new Promise((r) => { map.fitBounds([[bounds[0][0] - 0.6, bounds[0][1] - 0.5], [bounds[1][0] + 0.6, bounds[1][1] + 0.5]], { padding: { top: 80, bottom: 120, left: 24, right: 24 }, maxZoom: 6, pitch: 28, bearing: -10, duration: 2600 }); map.once("moveend", r); });
        await wait(LOOP_GAP_MS);
      }

      map.on("load", async function () {
        map.addSource("era-flow", { type: "geojson", data: emptyFC() });
        map.addLayer({
          id: "era-flow-circles",
          type: "circle",
          source: "era-flow",
          paint: {
            "circle-radius": 1.45,
            "circle-color": ["case", ["==", ["get", "hot"], 1], "#8be9ff", "#37d5ff"],
            "circle-opacity": ["get", "o"],
            "circle-blur": 0.28,
            "circle-stroke-width": 0.35,
            "circle-stroke-color": "rgba(220,245,255,0.65)",
            "circle-stroke-opacity": ["get", "o"],
          },
        });
        map.addSource("hero-flow", { type: "geojson", data: emptyFC() });
        map.addLayer({
          id: "hero-flow-circles",
          type: "circle",
          source: "hero-flow",
          paint: {
            "circle-radius": 2.65,
            "circle-color": "#9fb3c2",
            "circle-opacity": 0.56,
            "circle-blur": 0.28,
            "circle-stroke-width": 0.5,
            "circle-stroke-color": "rgba(255,255,255,0.55)",
            "circle-stroke-opacity": 0.38,
          },
        });
        map.addSource("hero-comet", { type: "geojson", data: emptyFC() });
        map.addLayer({
          id: "hero-comet-circles",
          type: "circle",
          source: "hero-comet",
          paint: {
            "circle-radius": ["get", "r"],
            "circle-color": [
              "case",
              ["==", ["get", "head"], 1],
              "#ff5d73",
              "#ff9ab0",
            ],
            "circle-opacity": ["get", "o"],
            "circle-stroke-width": ["case", ["==", ["get", "head"], 1], 1.28, 0.8],
            "circle-stroke-color": "rgba(255,255,255,0.82)",
            "circle-stroke-opacity": ["get", "o"],
            "circle-blur": ["case", ["==", ["get", "head"], 1], 0.08, 0.22],
          },
        });

        try {
          const r = await fetch(MIGRATION_URL);
          if (r.ok) migrationBuckets = buildMigrationBuckets(await r.json());
        } catch (e) { console.warn("migration load failed", e); }

        if (!walkedRaf) walkedRaf = requestAnimationFrame(tickWalked);
        if (!migrationRaf) migrationRaf = requestAnimationFrame(tickMigration);

        for (;;) {
          try { await runSequence(); } catch (e) { console.warn(e); await wait(1800); }
        }
      });
    })();
  </script>
</body>
</html>
