<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>李清照行迹 · MapLibre 镜头 + 地形 Demo（约 65s+ 循环）</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css"
    crossorigin=""
  />
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; font-family: system-ui, sans-serif; }
    #map { position: absolute; inset: 0; }
    #hud {
      position: absolute;
      z-index: 2;
      left: 12px;
      right: 12px;
      top: 12px;
      max-width: min(520px, 94vw);
      padding: 10px 14px;
      background: rgba(255, 255, 255, 0.92);
      border-radius: 10px;
      border: 1px solid #cfd8dc;
      font-size: 13px;
      line-height: 1.45;
      color: #263238;
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.08);
    }
    #hud strong { color: #880e4f; }
    #hud code { font-size: 11px; background: #eceff1; padding: 2px 6px; border-radius: 4px; }
    a { color: #1565c0; }
    /* 地名：HTML Marker 才能稳定用系统楷体（GL symbol 受字形服务限制） */
    .wp-label-marker {
      font-family: "Kaiti SC", "STKaiti", "KaiTi", "Songti SC", "FangSong", serif;
      font-size: 19px;
      font-weight: 700;
      line-height: 1.2;
      color: #ffd166;
      text-shadow:
        0 0 6px #fff,
        0 0 10px #fff,
        0 1px 2px rgba(255, 255, 255, 0.95);
      white-space: nowrap;
      pointer-events: none;
      user-select: none;
      transition:
        opacity 0.58s ease,
        filter 0.62s ease,
        transform 0.55s cubic-bezier(0.22, 1, 0.36, 1);
    }
    /* 未到：完全不可见，不占模糊合成层 */
    .wp-label-marker.wp-label-off {
      visibility: hidden;
      opacity: 0;
      filter: none;
      transform: translateY(0);
    }
    /* 到达瞬间：仅当前城进入「由糊到清」起点 */
    .wp-label-marker.wp-label-reveal-from {
      visibility: visible;
      opacity: 0;
      filter: blur(10px);
      transform: translateY(5px);
    }
    .wp-label-marker.wp-label-visible {
      visibility: visible;
      opacity: 1;
      filter: blur(0);
      transform: translateY(0);
    }
    .wp-label-marker.wp-label-no-transition {
      transition: none !important;
    }
    /* 北宋 / 南宋 / 辽 / 金 / 西夏：据 Hartwell 疆域面包络中心，大字淡色水印 */
    .regime-map-label {
      font-family: "Kaiti SC", "STKaiti", "KaiTi", "Songti SC", "FangSong", serif;
      font-size: 28px;
      font-weight: 600;
      letter-spacing: 0.14em;
      color: rgba(207, 216, 220, 0.34);
      text-shadow:
        0 0 10px rgba(255, 255, 255, 0.98),
        0 0 18px rgba(255, 255, 255, 0.9),
        0 1px 2px rgba(255, 255, 255, 0.85);
      pointer-events: none;
      user-select: none;
      white-space: nowrap;
      transition: opacity 0.45s ease, visibility 0.45s ease;
    }
    .regime-map-label.regime-label-hidden {
      visibility: hidden;
      opacity: 0;
    }
    /* 与 trajectories.json detail_text 一致的事迹摘要 */
    #deed-pop {
      position: fixed;
      z-index: 4;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%) translateY(120%);
      width: min(440px, 92vw);
      max-height: min(38vh, 320px);
      padding: 12px 16px 14px;
      background: rgba(7, 11, 20, 0.84);
      border: 1px solid rgba(255, 107, 141, 0.45);
      border-radius: 12px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.35);
      font-family: "Kaiti SC", "STKaiti", "KaiTi", "Songti SC", serif;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease, transform 0.35s ease;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    #deed-pop.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    #deed-pop .deed-place {
      font-size: 18px;
      font-weight: 800;
      color: #ff6b8d;
      margin-bottom: 4px;
    }
    #deed-pop .deed-year {
      font-size: 13px;
      font-weight: 700;
      color: #90caf9;
      margin-bottom: 8px;
      letter-spacing: 0.04em;
    }
    #deed-pop .deed-body {
      font-size: 16px;
      line-height: 1.65;
      color: #e6edf3;
      white-space: pre-wrap;
      word-break: break-word;
    }
    #timeline-hud {
      position: absolute;
      z-index: 3;
      top: 12px;
      left: 12px;
      max-width: min(420px, 84vw);
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid rgba(73, 95, 118, 0.62);
      background: rgba(6, 10, 18, 0.76);
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.35);
      color: #e2ecf5;
      pointer-events: none;
      backdrop-filter: blur(1.5px);
    }
    #timeline-hud .timeline-year {
      font-size: 17px;
      font-weight: 800;
      color: #ffd166;
      margin-bottom: 4px;
      line-height: 1.2;
    }
    #timeline-hud .timeline-event {
      font-size: 14px;
      line-height: 1.45;
      color: #d6e6f7;
    }
    #timeline-hud.transition-hit {
      border-color: rgba(255, 209, 102, 0.92);
      box-shadow: 0 0 0 1px rgba(255, 209, 102, 0.28), 0 0 24px rgba(255, 209, 102, 0.2);
    }
  </style>
</head>
<body>

  <div id="timeline-hud" aria-live="polite" aria-label="年份与大事记">
    <div class="timeline-year">公元 1084 年</div>
    <div class="timeline-event">词人南渡前的汴京旧梦仍在酝酿。</div>
  </div>
  <div id="map" aria-label="地图"></div>
  <div id="deed-pop" aria-live="polite" aria-label="事迹与年份"></div>
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js" crossorigin=""></script>
  <script>
(function () {
  /**
   * 与 trajectories.json 李清照路点一致；detail 为库中 detail_text（可多条合并）
   */
  const WAYPOINTS = [
    {
      lng: 117.532344,
      lat: 36.685415,
      label: "章丘 (出生地)",
      detail: "父格非官郓州教授。",
    },
    {
      lng: 114.313904,
      lat: 34.802941,
      label: "开封",
      detail: "父格非官太学正，随父居京师。",
    },
    {
      lng: 118.440962,
      lat: 36.778223,
      label: "益都",
      detail: "，24岁\n，25-38岁",
    },
    {
      lng: 118.802891,
      lat: 32.064735,
      label: "南京",
      detail:
        "春，抵达江宁。有词咏旅邸后庭梅花。作品：《殢人娇》（玉瘦香浓） 殢人娇 后庭梅花开有感 （1128年2月） 宋 · 李清照",
    },
    {
      lng: 120.586673,
      lat: 30.036519,
      label: "绍兴",
      detail: "，46岁\n，48岁",
    },
    {
      lng: 120.161693,
      lat: 30.280059,
      label: "杭州",
      detail: "追随高宗赴临安。\n，52-73岁",
    },
  ];

  const DYNASTY_URL = "data/hartwell_dynasty_outlines.json";
  const MIGRATION_DATA_URL = "data/trajectories.json";
  /** 与 WAYPOINTS 对齐的叙事历法年（用于北宋→南宋叠层渐变） */
  const WAYPOINT_YEARS = [1084, 1096, 1112, 1128, 1132, 1155];
  const TIMELINE_EVENTS = [
    { year: 1084, text: "李清照生于章丘，书香门第中长成。" },
    { year: 1101, text: "与赵明诚成婚，金石书画相契相知。" },
    { year: 1127, text: "靖康之变，北宋覆亡，南渡序幕开启。" },
    { year: 1128, text: "辗转江宁，家国离乱深刻进入词境。" },
    { year: 1129, text: "赵明诚卒于建康，清照由此长入孤旅。" },
    { year: 1132, text: "至越地绍兴一带，南渡后行迹渐定。" },
    { year: 1134, text: "整理旧藏与文稿，词风更趋沉郁深婉。" },
    { year: 1155, text: "晚岁定居临安附近，清照词名流传后世。" },
  ];
  const COMET_MAX = 18;
  /** A→B 段内插值时长（越大越慢、越显渐进） */
  const SEGMENT_MS = 4800;
  /** 沿已走路径流动点阵：按路径长度动态算点数，保持近似恒定密度 */
  const WALKED_FLOW_DOT_SPACING_DEG = 0.16;
  const WALKED_FLOW_DOT_MIN = 56;
  const WALKED_FLOW_DOT_MAX = 420;
  const WALKED_FLOW_LAPS_PER_SEC = 0.048;
  /** 镜头与当前点相距超过约「度」阈值才跟动（约几十公里量级，可调） */
  const CAMERA_MOVE_THRESH_DEG = 0.38;
  /** 1125→北宋为主，1128→南宋为主，中间线性渐变（与主图 960–1126 / 1127–1279 切片一致） */
  const SONG_BLEND_LO = 1125;
  const SONG_BLEND_HI = 1128;
  /** 与疆域渐变 u 配合：北宋/辽偏 u 低时；南宋/金偏 u 高时（避免「北宋图」上出现南宋字） */
  const REGIME_U_BEI_MAX = 0.48;
  const REGIME_U_LIAO_MAX = 0.45;
  const REGIME_U_NAN_MIN = 0.42;
  const REGIME_U_JIN_MIN = 0.38;
  /** 到达每处后展示事迹浮层时长（毫秒），再开始迁往下一处 */
  const DEED_SHOW_MS = 3800;
  /** 迁移结束后：全景拉远，定格停留 */
  const PANORAMA_EASE_MS = 3600;
  const PANORAMA_HOLD_MS = 4800;
  /** 同代南迁背景线：只取明显南移，按年份窗口回看 */
  const MIGRATION_WINDOW_YEARS = 32;
  const MIGRATION_MIN_START_LAT = 31;
  const MIGRATION_MIN_SOUTH_DELTA = 0.22;
  const MIGRATION_MIN_SEG_DIST = 0.42;
  const MIGRATION_MAX_FEATURES = 900;
  const MIGRATION_ACTIVE_SEGMENT_MAX = 260;
  const MIGRATION_FLOW_MIN_PARTICLES = 120;
  const MIGRATION_FLOW_MAX_PARTICLES = 280;
  const MIGRATION_FLOW_LAPS_PER_SEC = 0.022;
  const TRANSITION_HIT_YEAR = 1127;
  const TRANSITION_HIT_WINDOW = 2.2;
  const LIQZ_NAME = "李清照";

  function trimDetail(t) {
    if (!t) return "";
    return String(t)
      .split(/\n/)
      .map(function (line) {
        return line.replace(/^[,，、\s]+/, "").trim();
      })
      .filter(Boolean)
      .join("\n");
  }

  function hideDeedPop() {
    const el = document.getElementById("deed-pop");
    if (!el) return;
    el.classList.remove("visible");
    el.textContent = "";
  }

  function showDeedPop(idx) {
    const el = document.getElementById("deed-pop");
    const w = WAYPOINTS[idx];
    if (!el || !w || !w.detail) return;
    const body = trimDetail(w.detail);
    const y = WAYPOINT_YEARS[idx];
    el.textContent = "";
    const place = document.createElement("div");
    place.className = "deed-place";
    place.textContent = w.label || "";
    el.appendChild(place);
    if (typeof y === "number" && !isNaN(y)) {
      const yr = document.createElement("div");
      yr.className = "deed-year";
      yr.textContent = "公元 " + y + " 年";
      el.appendChild(yr);
    }
    const p = document.createElement("div");
    p.className = "deed-body";
    p.textContent = body;
    el.appendChild(p);
    el.classList.add("visible");
  }

  function waitDeed(idx) {
    showDeedPop(idx);
    return wait(DEED_SHOW_MS).then(function () {
      hideDeedPop();
    });
  }

  function getMapboxToken() {
    try {
      const q = new URLSearchParams(location.search);
      return (q.get("mapbox") || q.get("token") || "").trim();
    } catch {
      return "";
    }
  }

  const mapboxToken = getMapboxToken();

  const map = new maplibregl.Map({
    container: "map",
    style: "https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json",
    center: [WAYPOINTS[0].lng, WAYPOINTS[0].lat],
    zoom: 5.4,
    pitch: 0,
    bearing: 0,
    maxPitch: 85,
    attributionControl: true,
  });

  map.addControl(new maplibregl.NavigationControl({ visualizePitch: true }), "top-right");

  /** 已完成段折线顶点序列，供淡灰点阵沿路径流动（不渲染线） */
  const walkedPathCoords = [];
  let walkedFlowRaf = null;
  /** 0–1：整段路径上「流」的相位，循环 */
  let walkedFlowLapPhase = 0;
  let songDynastyReady = false;
  /** 使用 bundle v4 的 borderHard / borderSoft / borderChinaFade（国界重合处无硬线，外侧淡面暗示外延） */
  let songDynastyBorderSplit = false;
  let migrationYearBuckets = null;
  let migrationLastYear = null;
  let migrationActiveSegments = [];
  let eraMigrationFlowRaf = null;
  let eraMigrationFlowPhase = 0;

  function simYearAlongSegment(segIndex, t) {
    const y0 = WAYPOINT_YEARS[segIndex];
    const y1 = WAYPOINT_YEARS[segIndex + 1];
    return y0 + (y1 - y0) * t;
  }

  function setDynastyForSimYear(year) {
    const y = Math.max(960, Math.min(1279, year));
    const u = Math.min(1, Math.max(0, (y - SONG_BLEND_LO) / (SONG_BLEND_HI - SONG_BLEND_LO)));
    if (songDynastyReady && map.getLayer("song-north-fill")) {
      const fillMax = 0.085;
      const lineNorthMax = 0.58;
      const lineSouthMax = 0.58;
      map.setPaintProperty("song-north-fill", "fill-opacity", fillMax * (1 - u));
      map.setPaintProperty("song-south-fill", "fill-opacity", fillMax * u);
      const nBase = lineNorthMax * (1 - u) + 0.12 * u;
      const sBase = 0.12 * (1 - u) + lineSouthMax * u;
      if (songDynastyBorderSplit && map.getLayer("song-north-line-hard")) {
        map.setPaintProperty("song-north-line-hard", "line-opacity", nBase * 0.96);
        map.setPaintProperty("song-north-line-soft", "line-opacity", nBase * 0.24);
        map.setPaintProperty("song-south-line-hard", "line-opacity", sBase * 0.96);
        map.setPaintProperty("song-south-line-soft", "line-opacity", sBase * 0.24);
      } else if (map.getLayer("song-north-line")) {
        map.setPaintProperty("song-north-line", "line-opacity", nBase);
        map.setPaintProperty("song-south-line", "line-opacity", sBase);
      }
      if (map.getLayer("song-north-china-fade-fill")) {
        map.setPaintProperty("song-north-china-fade-fill", "fill-opacity", 0.05 * (1 - u) + 0.032 * u);
      }
      if (map.getLayer("song-south-china-fade-fill")) {
        map.setPaintProperty("song-south-china-fade-fill", "fill-opacity", 0.028 * (1 - u) + 0.055 * u);
      }
    }
    updateRegimeLabelVisibilityFromYU(y, u);
    updateEraMigrationOverlay(year);
    updateTimelineHud(year);
  }

  function migrationFeature(a, b, southDelta, dist) {
    return {
      type: "Feature",
      properties: {
        // 基础强度：位移越南向、距离越长，线越略可见
        o: Math.min(1, 0.35 + southDelta * 0.65 + dist * 0.08),
      },
      geometry: {
        type: "LineString",
        coordinates: [
          [a.lng, a.lat],
          [b.lng, b.lat],
        ],
      },
    };
  }

  function buildMigrationBuckets(bundle) {
    const buckets = new Map();
    if (!bundle || !bundle.poets || !Array.isArray(bundle.poets)) return buckets;
    for (let p = 0; p < bundle.poets.length; p++) {
      const poet = bundle.poets[p];
      if (!poet || poet.name === LIQZ_NAME) continue;
      const wps = poet.waypoints;
      if (!Array.isArray(wps) || wps.length < 2) continue;
      for (let i = 0; i < wps.length - 1; i++) {
        const a = wps[i];
        const b = wps[i + 1];
        if (!a || !b) continue;
        if (typeof a.lng !== "number" || typeof a.lat !== "number") continue;
        if (typeof b.lng !== "number" || typeof b.lat !== "number") continue;
        if (Math.hypot(a.lng - b.lng, a.lat - b.lat) < 1e-8) continue;
        const moveYearRaw =
          typeof b.yearStart === "number"
            ? b.yearStart
            : typeof a.yearEnd === "number"
              ? a.yearEnd
              : a.yearStart;
        if (typeof moveYearRaw !== "number" || !isFinite(moveYearRaw)) continue;
        const moveYear = Math.floor(moveYearRaw);
        if (moveYear < 980 || moveYear > 1220) continue;
        // 只取“北向起点 -> 南向落点”的明显迁移段，突出南迁浪潮
        const southDelta = a.lat - b.lat;
        if (a.lat < MIGRATION_MIN_START_LAT || southDelta < MIGRATION_MIN_SOUTH_DELTA) continue;
        const dist = Math.hypot(a.lng - b.lng, a.lat - b.lat);
        if (dist < MIGRATION_MIN_SEG_DIST) continue;
        if (!buckets.has(moveYear)) buckets.set(moveYear, []);
        buckets.get(moveYear).push(migrationFeature(a, b, southDelta, dist));
      }
    }
    return buckets;
  }

  function updateEraMigrationOverlay(year) {
    if (!migrationYearBuckets) return;
    const y = Math.floor(year);
    if (migrationLastYear === y) return;
    migrationLastYear = y;
    const feats = [];
    const yLo = Math.max(960, y - MIGRATION_WINDOW_YEARS);
    for (let yy = yLo; yy <= y; yy++) {
      const rows = migrationYearBuckets.get(yy);
      if (!rows || rows.length === 0) continue;
      const age = y - yy;
      const fade = 1 - age / MIGRATION_WINDOW_YEARS;
      for (let i = 0; i < rows.length; i++) {
        const base = rows[i];
        feats.push({
          type: "Feature",
          properties: { o: (base.properties.o || 1) * Math.max(0.08, fade) },
          geometry: base.geometry,
        });
        if (feats.length >= MIGRATION_MAX_FEATURES) break;
      }
      if (feats.length >= MIGRATION_MAX_FEATURES) break;
    }
    migrationActiveSegments = feats
      .slice(0, MIGRATION_ACTIVE_SEGMENT_MAX)
      .map(function (f) {
        const c = f.geometry && f.geometry.coordinates;
        const o = f.properties && typeof f.properties.o === "number" ? f.properties.o : 0.2;
        if (!c || c.length < 2) return null;
        return { a: c[0], b: c[1], o: o };
      })
      .filter(Boolean);
    startEraMigrationFlowAnimation();
  }

  function lerpPoint(a, b, t) {
    return [a[0] + (b[0] - a[0]) * t, a[1] + (b[1] - a[1]) * t];
  }

  function stopEraMigrationFlowAnimation() {
    if (eraMigrationFlowRaf != null) {
      cancelAnimationFrame(eraMigrationFlowRaf);
      eraMigrationFlowRaf = null;
    }
    eraMigrationFlowPhase = 0;
    tickEraMigrationFlow._lastMs = 0;
    const src = map.getSource("era-migration-flow");
    if (src) src.setData(emptyFC());
  }

  function tickEraMigrationFlow(nowMs) {
    const src = map.getSource("era-migration-flow");
    const segs = migrationActiveSegments;
    if (!src || !segs || segs.length === 0) {
      if (eraMigrationFlowRaf != null) {
        cancelAnimationFrame(eraMigrationFlowRaf);
        eraMigrationFlowRaf = null;
      }
      return;
    }
    eraMigrationFlowRaf = requestAnimationFrame(tickEraMigrationFlow);
    const last = tickEraMigrationFlow._lastMs || nowMs;
    const dt = Math.min(0.1, Math.max(0, (nowMs - last) / 1000));
    tickEraMigrationFlow._lastMs = nowMs;
    const transitionBoost = Math.max(0, 1 - Math.min(1, Math.abs((migrationLastYear || 0) - TRANSITION_HIT_YEAR) / 3.2));
    const speedBoost = 1 + transitionBoost * 0.55;
    eraMigrationFlowPhase += MIGRATION_FLOW_LAPS_PER_SEC * speedBoost * (dt || 0.016);
    eraMigrationFlowPhase %= 1;
    const boostedMax = Math.round(MIGRATION_FLOW_MAX_PARTICLES * (1 + transitionBoost * 0.42));
    const n = Math.min(boostedMax, Math.max(MIGRATION_FLOW_MIN_PARTICLES, segs.length));
    const feats = [];
    for (let i = 0; i < n; i++) {
      const seg = segs[i % segs.length];
      const t = (eraMigrationFlowPhase + i / n) % 1;
      const pt = lerpPoint(seg.a, seg.b, t);
      feats.push({
        type: "Feature",
        properties: {
          o: Math.min(0.84, Math.max(0.14, (seg.o || 0.2) * (0.9 + transitionBoost * 0.42))),
          hot: transitionBoost > 0.2 ? 1 : 0,
        },
        geometry: { type: "Point", coordinates: pt },
      });
    }
    src.setData({ type: "FeatureCollection", features: feats });
  }
  tickEraMigrationFlow._lastMs = 0;

  function startEraMigrationFlowAnimation() {
    if (!migrationActiveSegments || migrationActiveSegments.length === 0) return;
    if (eraMigrationFlowRaf != null) return;
    tickEraMigrationFlow._lastMs = performance.now();
    eraMigrationFlowRaf = requestAnimationFrame(tickEraMigrationFlow);
  }

  function nearestTimelineEventText(year) {
    const y = Math.floor(year);
    let text = TIMELINE_EVENTS[0] ? TIMELINE_EVENTS[0].text : "";
    for (let i = 0; i < TIMELINE_EVENTS.length; i++) {
      if (TIMELINE_EVENTS[i].year <= y) text = TIMELINE_EVENTS[i].text;

  function updateTimelineHud(year) {

  function snapshotHasBorderSplit(snap) {

  /** id -> Marker；标签显隐随模拟年，不由数组顺序推断 */
  const regimeMarkers = Object.create(null);

  function eachCoordDeep(coords, fn) {
    if (!coords || coords.length === 0) return;
    if (typeof coords[0] === "number") {
      fn(coords[0], coords[1]);
    } else {
      for (let i = 0; i < coords.length; i++) {
        eachCoordDeep(coords[i], fn);
      }
    }
  }

  function geomBBoxCenter(geom) {
    if (!geom || !geom.coordinates) return null;
    let minLng = Infinity;
    let maxLng = -Infinity;
    let minLat = Infinity;
    let maxLat = -Infinity;
    eachCoordDeep(geom.coordinates, function (lng, lat) {
      minLng = Math.min(minLng, lng);
      maxLng = Math.max(maxLng, lng);
      minLat = Math.min(minLat, lat);
      maxLat = Math.max(maxLat, lat);
    });
    if (minLng === Infinity) return null;
    return [(minLng + maxLng) / 2, (minLat + maxLat) / 2];
  }

  function findFeatureCenterByDynasty(fc, dynastyKey) {
    if (!fc || !fc.features) return null;
    for (let i = 0; i < fc.features.length; i++) {
      const f = fc.features[i];
      const k = f.properties && f.properties.dynastyKey;
      if (k === dynastyKey && f.geometry) {
        return geomBBoxCenter(f.geometry);
      }
    }
    return null;
  }

  function clearRegimeLabelMarkers() {
    Object.keys(regimeMarkers).forEach(function (k) {
      if (regimeMarkers[k]) regimeMarkers[k].remove();
      delete regimeMarkers[k];
    });
  }

  function setRegimeMarkerVisible(id, visible) {
    const mk = regimeMarkers[id];
    if (!mk) return;
    const el = mk.getElement();
    if (visible) {
      el.classList.remove("regime-label-hidden");
    } else {
      el.classList.add("regime-label-hidden");
    }
  }

  /**
   * y：模拟历法年；u：与疆域叠层相同的靖康前后渐变（1125→0，1128→1）。
   * 北宋/辽绑定 chin1080 主导期；南宋/金绑定 chin1200 主导期；西夏两期皆存，全程显示。
   */
  function updateRegimeLabelVisibilityFromYU(y, u) {
    const hasAny = regimeMarkers.bei || regimeMarkers.nan;
    if (!hasAny) return;
    const showBeiSong = y < 1127 && u < REGIME_U_BEI_MAX;
    const showLiao = y <= 1125 && u < REGIME_U_LIAO_MAX;
    const showXiXia = y >= 960 && y < 1227;
    const showNanSong = y >= 1126 && u > REGIME_U_NAN_MIN;
    const showJin = y >= 1126 && u > REGIME_U_JIN_MIN;
    setRegimeMarkerVisible("bei", showBeiSong);
    setRegimeMarkerVisible("liao", showLiao);
    setRegimeMarkerVisible("xixia", showXiXia);
    setRegimeMarkerVisible("nan", showNanSong);
    setRegimeMarkerVisible("jin", showJin);
  }

  /** 政权大字：位置为 Hartwell 该 dynastyKey 面的经纬包络中心（近似视觉重心） */
  function addRegimeLabelMarkers(bundle) {
    clearRegimeLabelMarkers();
    if (!bundle || !bundle.snapshots) return;
    const rows = [
      { id: "bei", snap: "chin1080", dynastyKey: "song dynasty", text: "北宋" },
      { id: "liao", snap: "chin1080", dynastyKey: "liao dynasty", text: "辽" },
      { id: "xixia", snap: "chin1080", dynastyKey: "xixia", text: "西夏" },
      { id: "nan", snap: "chin1200", dynastyKey: "song dynasty", text: "南宋" },
      { id: "jin", snap: "chin1200", dynastyKey: "jin dynasty", text: "金" },
    ];
    for (let r = 0; r < rows.length; r++) {
      const row = rows[r];
      const snap = bundle.snapshots[row.snap] && bundle.snapshots[row.snap].geo;
      const pt = findFeatureCenterByDynasty(snap, row.dynastyKey);
      if (!pt) continue;
      const el = document.createElement("div");
      el.className = "regime-map-label regime-label-hidden";
      el.textContent = row.text;
      el.setAttribute("aria-hidden", "true");
      const mk = new maplibregl.Marker({ element: el, anchor: "center" })
        .setLngLat(pt)
        .addTo(map);
      regimeMarkers[row.id] = mk;
    }
    const y0 = Math.max(960, Math.min(1279, WAYPOINT_YEARS[0]));
    const u0 = Math.min(1, Math.max(0, (y0 - SONG_BLEND_LO) / (SONG_BLEND_HI - SONG_BLEND_LO)));
    updateRegimeLabelVisibilityFromYU(y0, u0);
  }

  function emptyFC() {
    return { type: "FeatureCollection", features: [] };
  }

  function degDist(lngA, latA, lngB, latB) {
    return Math.hypot(lngA - lngB, latA - latB);
  }

  function easeInOutCubic(t) {
    return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
  }

  function easeTo(opts) {
    return new Promise(function (resolve) {
      map.easeTo(Object.assign({ essential: true }, opts));
      map.once("moveend", resolve);
    });
  }

  /** [[minLng, minLat], [maxLng, maxLat]]，略扩边以免贴边 */
  function waypointBoundsPadded(padDeg) {
    let minLng = Infinity;
    let maxLng = -Infinity;
    let minLat = Infinity;
    let maxLat = -Infinity;
    for (let i = 0; i < WAYPOINTS.length; i++) {
      const w = WAYPOINTS[i];
      minLng = Math.min(minLng, w.lng);
      maxLng = Math.max(maxLng, w.lng);
      minLat = Math.min(minLat, w.lat);
      maxLat = Math.max(maxLat, w.lat);
    }
    const p = padDeg == null ? 0.42 : padDeg;
    return [
      [minLng - p, minLat - p],
      [maxLng + p, maxLat + p],
    ];
  }

  function fitBoundsPromise(bounds, opts) {
    return new Promise(function (resolve) {
      map.once("moveend", resolve);
      map.fitBounds(bounds, Object.assign({ essential: true }, opts));
    });
  }

  function wait(ms) {
    return new Promise(function (r) {
      setTimeout(r, ms);
    });
  }

  function buildCometFeatures(pathHist) {
    const n = pathHist.length;
    if (n === 0) return emptyFC();
    const feats = [];
    for (let i = 0; i < n; i++) {
      const u = n === 1 ? 1 : i / (n - 1);
      const head = i === n - 1 ? 1 : 0;
      const o = head ? Math.min(0.94, 0.06 + 0.32 * u + 0.34) : 0.06 + 0.32 * u;
      let r = 1.6 + 4.8 * u;
      if (head) r = Math.max(r + 1.1, 6.4);
      feats.push({
        type: "Feature",
        properties: { o: o, r: r, head: head },
        geometry: { type: "Point", coordinates: pathHist[i] },
      });
    }
    return { type: "FeatureCollection", features: feats };
  }

  function pushTrail(pathHist, lng, lat) {
    const last = pathHist[pathHist.length - 1];
    if (last && last[0] === lng && last[1] === lat) return;
    pathHist.push([lng, lat]);
    while (pathHist.length > COMET_MAX) pathHist.shift();
  }

  function setCometSource(pathHist) {
    const src = map.getSource("mover-comet");
    if (src) src.setData(buildCometFeatures(pathHist));
  }

  function coordsAlmostEqual(p, q) {
    return Math.hypot(p[0] - q[0], p[1] - q[1]) < 1e-9;
  }

  function polylineArcLengths(coords) {
    const lens = [];
    let total = 0;
    for (let i = 0; i < coords.length - 1; i++) {
      const d = degDist(coords[i][0], coords[i][1], coords[i + 1][0], coords[i + 1][1]);
      lens.push(d);
      total += d;
    }
    return { lens: lens, total: total };
  }

  function pointAtArcLength(coords, lens, distAlong) {
    const n = coords.length;
    if (n < 2 || lens.length === 0) return coords[0] ? coords[0].slice() : [0, 0];
    let tot = 0;
    for (let j = 0; j < lens.length; j++) tot += lens[j];
    if (tot < 1e-12) return coords[n - 1].slice();
    let d = distAlong % tot;
    if (d < 0) d += tot;
    let acc = 0;
    for (let i = 0; i < lens.length; i++) {
      if (acc + lens[i] >= d) {
        const t = lens[i] < 1e-12 ? 1 : (d - acc) / lens[i];
        const p0 = coords[i];
        const p1 = coords[i + 1];
        return [p0[0] + (p1[0] - p0[0]) * t, p0[1] + (p1[1] - p0[1]) * t];
      }
      acc += lens[i];
    }
    return coords[n - 1].slice();
  }

  function syncWalkedLineGeoJSON() {
    /* 已走路径仅点阵，无折线图层 */
  }

  function stopWalkedFlowAnimation() {
    if (walkedFlowRaf != null) {
      cancelAnimationFrame(walkedFlowRaf);
      walkedFlowRaf = null;
    }
    walkedFlowLapPhase = 0;
    tickWalkedFlow._lastMs = 0;
    const src = map.getSource("walked-flow");
    if (src) src.setData(emptyFC());
  }

  function tickWalkedFlow(nowMs) {
    const src = map.getSource("walked-flow");
    if (!src || walkedPathCoords.length < 2) {
      if (walkedFlowRaf != null) {
        cancelAnimationFrame(walkedFlowRaf);
        walkedFlowRaf = null;
      }
      return;
    }
    const met = polylineArcLengths(walkedPathCoords);
    if (met.total < 1e-8) {
      if (walkedFlowRaf != null) {
        cancelAnimationFrame(walkedFlowRaf);
        walkedFlowRaf = null;
      }
      return;
    }
    walkedFlowRaf = requestAnimationFrame(tickWalkedFlow);
    const last = tickWalkedFlow._lastMs || nowMs;
    const dt = Math.min(0.12, Math.max(0, (nowMs - last) / 1000));
    tickWalkedFlow._lastMs = nowMs;
    walkedFlowLapPhase += WALKED_FLOW_LAPS_PER_SEC * (dt || 0.016);
    walkedFlowLapPhase %= 1;
    const dotCount = Math.max(
      WALKED_FLOW_DOT_MIN,
      Math.min(WALKED_FLOW_DOT_MAX, Math.round(met.total / WALKED_FLOW_DOT_SPACING_DEG))
    );
    const feats = [];
    for (let i = 0; i < dotCount; i++) {
      const u = i / dotCount;
      const s = walkedFlowLapPhase + u;
      const distAlong = (s - Math.floor(s)) * met.total;
      const pt = pointAtArcLength(walkedPathCoords, met.lens, distAlong);
      feats.push({
        type: "Feature",
        properties: {},
        geometry: { type: "Point", coordinates: pt },
      });
    }
    src.setData({ type: "FeatureCollection", features: feats });
  }
  tickWalkedFlow._lastMs = 0;

  function startWalkedFlowAnimation() {
    if (walkedPathCoords.length < 2) return;
    if (walkedFlowRaf != null) return;
    tickWalkedFlow._lastMs = performance.now();
    walkedFlowRaf = requestAnimationFrame(tickWalkedFlow);
  }

  function extendWalkedPathSegment(a, b) {
    const pa = [a.lng, a.lat];
    const pb = [b.lng, b.lat];
    if (walkedPathCoords.length === 0) {
      walkedPathCoords.push(pa);
    } else {
      const last = walkedPathCoords[walkedPathCoords.length - 1];
      if (!coordsAlmostEqual(last, pa)) {
        walkedPathCoords.push(pa);
      }
    }
    const last2 = walkedPathCoords[walkedPathCoords.length - 1];
    if (!coordsAlmostEqual(last2, pb)) {
      walkedPathCoords.push(pb);
    }
    syncWalkedLineGeoJSON();
    startWalkedFlowAnimation();
  }

  function appendTraveledSegment(a, b) {
    extendWalkedPathSegment(a, b);
  }

  function maybeEaseCameraToward(lng, lat, zoom, pitch, bearing, duration) {
    const c = map.getCenter();
    if (degDist(c.lng, c.lat, lng, lat) < CAMERA_MOVE_THRESH_DEG) return Promise.resolve();
    return easeTo({
      center: [lng, lat],
      zoom: zoom,
      pitch: pitch,
      bearing: bearing,
      duration: duration,
    });
  }

  function animateSegment(a, b, pathHist, segIndex) {
    return new Promise(function (resolve) {
      pushTrail(pathHist, a.lng, a.lat);
      setCometSource(pathHist);
      const t0 = performance.now();
      const midLng = (a.lng + b.lng) / 2;
      const midLat = (a.lat + b.lat) / 2;
      const span = degDist(a.lng, a.lat, b.lng, b.lat);
      const z = span > 2.2 ? 5.55 : span > 1.0 ? 6.1 : 6.65;

      maybeEaseCameraToward(midLng, midLat, z, 58 - segIndex * 0.9, map.getBearing(), 1100).then(function () {
        function frame() {
          const u = Math.min(1, (performance.now() - t0) / SEGMENT_MS);
          const t = easeInOutCubic(u);
          const lng = a.lng + (b.lng - a.lng) * t;
          const lat = a.lat + (b.lat - a.lat) * t;
          setDynastyForSimYear(simYearAlongSegment(segIndex, t));
          pushTrail(pathHist, lng, lat);
          setCometSource(pathHist);
          if (u < 1) {
            requestAnimationFrame(frame);
          } else {
            pushTrail(pathHist, b.lng, b.lat);
            setCometSource(pathHist);
            appendTraveledSegment(a, b);
            resolve();
          }
        }
        requestAnimationFrame(frame);
      });
    });
  }

  function trimBasemapLabels() {
    const s = map.getStyle();
    if (!s || !s.layers) return;
    for (let i = 0; i < s.layers.length; i++) {
      const layer = s.layers[i];
      if (layer.type !== "symbol") continue;
      const low = layer.id.toLowerCase();
      if (
        low.includes("settlement") ||
        low.includes("place") ||
        low.includes("poi") ||
        low.includes("housenumber") ||
        low.includes("transportation_name") ||
        low.includes("road") ||
        low.includes("water_name") ||
        /** Carto：watername_ocean / watername_sea 等，id 不含下划线 water_name */
        low.includes("watername") ||
        low.includes("waterway") ||
        low.includes("natural") ||
        low.includes("airport") ||
        low.includes("park") ||
        low.includes("label")
      ) {
        try {
          map.setLayoutProperty(layer.id, "visibility", "none");
        } catch (_) {
          /* */
        }
      }
    }
  }

  const waypointMarkers = [];

  function addWaypointLabelMarkers() {
    for (let i = 0; i < waypointMarkers.length; i++) {
      waypointMarkers[i].remove();
    }
    waypointMarkers.length = 0;
    WAYPOINTS.forEach(function (w) {
      const el = document.createElement("div");
      el.className = "wp-label-marker wp-label-off";
      el.textContent = w.label;
      const mk = new maplibregl.Marker({
        element: el,
        anchor: "bottom",
        offset: [0, -6],
      })
        .setLngLat([w.lng, w.lat])
        .addTo(map);
      waypointMarkers.push(mk);
    });
  }

  function hideAllWaypointLabels() {
    for (let i = 0; i < waypointMarkers.length; i++) {
      const el = waypointMarkers[i].getElement();
      el.classList.add("wp-label-no-transition");
      el.classList.remove("wp-label-visible", "wp-label-reveal-from");
      el.classList.add("wp-label-off");
    }
    requestAnimationFrame(function () {
      for (let j = 0; j < waypointMarkers.length; j++) {
        waypointMarkers[j].getElement().classList.remove("wp-label-no-transition");
      }
    });
  }

  function revealWaypointLabel(idx) {
    if (idx < 0 || idx >= waypointMarkers.length) return;
    const el = waypointMarkers[idx].getElement();
    el.classList.add("wp-label-no-transition");
    el.classList.remove("wp-label-off", "wp-label-visible");
    el.classList.add("wp-label-reveal-from");
    requestAnimationFrame(function () {
      el.classList.remove("wp-label-no-transition");
      void el.offsetWidth;
      el.classList.remove("wp-label-reveal-from");
      el.classList.add("wp-label-visible");
    });
  }

  function clearRouteRecapLayer() {
    /* 无全景 recap 折线层 */
  }

  function resetVisualState(pathHist) {
    hideDeedPop();
    hideAllWaypointLabels();
    clearRouteRecapLayer();
    stopWalkedFlowAnimation();
    stopEraMigrationFlowAnimation();
    walkedPathCoords.length = 0;
    syncWalkedLineGeoJSON();
    pathHist.length = 0;
    setCometSource(pathHist);
    setDynastyForSimYear(WAYPOINT_YEARS[0]);
  }

  /** 段末清空彗星尾，全景拉远；全程仍以淡灰点阵沿已走路径流动 */
  async function showRouteRecapPanorama(pathHist) {
    pathHist.length = 0;
    setCometSource(pathHist);

    await fitBoundsPromise(waypointBoundsPadded(0.45), {
      padding: { top: 88, bottom: 100, left: 36, right: 36 },
      maxZoom: 6.05,
      pitch: 26,
      bearing: -14,
      duration: PANORAMA_EASE_MS,
    });

    await wait(PANORAMA_HOLD_MS);
  }

  async function runSequence(pathHist) {
    resetVisualState(pathHist);

    const w0 = WAYPOINTS[0];
    await easeTo({
      center: [w0.lng, w0.lat],
      zoom: 10.2,
      pitch: 78,
      bearing: 38,
      duration: 3800,
    });
    pushTrail(pathHist, w0.lng, w0.lat);
    setCometSource(pathHist);
    setDynastyForSimYear(WAYPOINT_YEARS[0]);
    revealWaypointLabel(0);
    await waitDeed(0);

    await easeTo({
      center: [116.85, 35.55],
      zoom: 6.35,
      pitch: 68,
      bearing: -22,
      duration: 3200,
    });
    setDynastyForSimYear(1108);

    for (let i = 0; i < WAYPOINTS.length - 1; i++) {
      await animateSegment(WAYPOINTS[i], WAYPOINTS[i + 1], pathHist, i);
      revealWaypointLabel(i + 1);
      await waitDeed(i + 1);
      await wait(220);
    }

    const wLast = WAYPOINTS[WAYPOINTS.length - 1];
    await easeTo({
      center: [wLast.lng, wLast.lat],
      zoom: 8.2,
      pitch: 62,
      bearing: 12,
      duration: 2600,
    });
    pushTrail(pathHist, wLast.lng, wLast.lat);
    setCometSource(pathHist);
    setDynastyForSimYear(WAYPOINT_YEARS[WAYPOINT_YEARS.length - 1]);
    await wait(700);
    await showRouteRecapPanorama(pathHist);
  }

  const pathHist = [];

  async function loop() {
    for (;;) {
      try {
        await runSequence(pathHist);
      } catch (e) {
        console.warn(e);
        await wait(2000);
      }
    }
  }

  map.on("load", async function () {
    if (mapboxToken) {
      try {
        map.addSource("terrain-rgb", {
          type: "raster-dem",
          tiles: [
            "https://api.mapbox.com/v4/mapbox.terrain-rgb/{z}/{x}/{y}.pngraw?access_token=" +
              encodeURIComponent(mapboxToken),
          ],
          tileSize: 256,
          maxzoom: 14,
        });
        map.setTerrain({ source: "terrain-rgb", exaggeration: 1.45 });
      } catch (e) {
        console.warn("Terrain init failed", e);
      }
    }

    try {
      const dr = await fetch(DYNASTY_URL);
      if (dr.ok) {
        const bundle = await dr.json();
        if (bundle && bundle.snapshots) {
          addSongDynastyOverlays(bundle);
          addRegimeLabelMarkers(bundle);
          setDynastyForSimYear(WAYPOINT_YEARS[0]);
        }
      }
    } catch (e) {
      console.warn("Hartwell fetch failed", e);
    }

    map.addSource("walked-flow", { type: "geojson", data: emptyFC() });
    map.addSource("era-migration-flow", { type: "geojson", data: emptyFC() });
    map.addLayer({
      id: "era-migration-flow-circles",
      type: "circle",
      source: "era-migration-flow",
      paint: {
        "circle-radius": 1.45,
        "circle-color": [
          "case",
          ["==", ["get", "hot"], 1],
          "#8be9ff",
          "#37d5ff",
        ],
        "circle-opacity": ["get", "o"],
        "circle-blur": 0.28,
        "circle-stroke-width": 0.35,
        "circle-stroke-color": "rgba(220,245,255,0.65)",
        "circle-stroke-opacity": ["get", "o"],
      },
    });
    map.addLayer({
      id: "walked-flow-circles",
      type: "circle",
      source: "walked-flow",
      paint: {
        "circle-radius": 2.65,
        "circle-color": "#9fb3c2",
        "circle-opacity": 0.56,
        "circle-blur": 0.28,
        "circle-stroke-width": 0.5,
        "circle-stroke-color": "rgba(255,255,255,0.55)",
        "circle-stroke-opacity": 0.38,
      },
    });

    map.addSource("mover-comet", { type: "geojson", data: emptyFC() });
    map.addLayer({
      id: "mover-comet-circles",
      type: "circle",
      source: "mover-comet",
      paint: {
        "circle-radius": ["get", "r"],
        "circle-color": [
          "case",
          ["==", ["get", "head"], 1],
          "#ff5d73",
          "#90a4ae",
        ],
        "circle-opacity": ["get", "o"],
        "circle-stroke-width": ["case", ["==", ["get", "head"], 1], 1.2, 0.5],
        "circle-stroke-color": [
          "case",
          ["==", ["get", "head"], 1],
          "rgba(255,255,255,0.82)",
          "rgba(255,255,255,0.48)",
        ],
        "circle-stroke-opacity": ["get", "o"],
      },
    });

    function bringRouteAnimationLayersToFront() {
      ["era-migration-flow-circles", "walked-flow-circles", "mover-comet-circles"].forEach(function (id) {
        if (map.getLayer(id)) {
          try {
            map.moveLayer(id);
          } catch (_) {
            /* */
          }
        }
      });
    }
    bringRouteAnimationLayersToFront();

    try {
      const tr = await fetch(MIGRATION_DATA_URL);
      if (tr.ok) {
        const tj = await tr.json();
        migrationYearBuckets = buildMigrationBuckets(tj);
        migrationLastYear = null;
        updateEraMigrationOverlay(WAYPOINT_YEARS[0]);
      }
    } catch (e) {
      console.warn("Migration trajectories fetch failed", e);
    }

    trimBasemapLabels();
    addWaypointLabelMarkers();

    map.once("idle", function () {
      loop();
    });
  });
})();
  </script>
</body>
</html>
