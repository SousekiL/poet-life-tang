<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>李白 · 苏轼 · 李清照 — 动态行迹</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <style>
    :root {
      --bg-deep: #0f1923;
      --bg-surface: #172030;
      --bg-card: rgba(22, 32, 48, 0.88);
      --bg-card-solid: #1a2538;
      --text-primary: #e8edf3;
      --text-secondary: #8fa4bd;
      --text-muted: #5a7289;
      --accent-libai: #4a9eff;
      --accent-sushi: #ff5252;
      --accent-liqz: #f06292;
      --accent-liqz-glow: rgba(240, 98, 146, 0.35);
      --border-subtle: rgba(120, 155, 195, 0.22);
      --border-accent: rgba(240, 98, 146, 0.5);
      --trail-glow: 0 0 8px;
    }
    * { box-sizing: border-box; }
    html, body {
      height: 100%;
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: var(--bg-deep);
      display: flex;
      flex-direction: column;
      min-height: 0;
      color: var(--text-primary);
    }
    .toplink {
      flex-shrink: 0;
      padding: 8px 14px;
      font-size: 12px;
      color: var(--text-secondary);
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border-subtle);
    }
    .toplink a { color: var(--accent-liqz); text-decoration: none; }
    .toplink a:hover { text-decoration: underline; }
    #bar {
      flex-shrink: 0;
      min-height: 68px;
      padding: 10px 14px;
      background: var(--bg-surface);
      color: var(--text-primary);
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      flex-wrap: wrap;
      gap: 8px 16px;
      align-items: center;
    }
    #yearLabel { font-size: 22px; font-weight: 800; min-width: 110px; color: #fff; font-variant-numeric: tabular-nums; letter-spacing: 0.02em; }
    #poetBadge {
      font-size: 14px;
      font-weight: 700;
      padding: 5px 14px;
      border-radius: 999px;
      background: rgba(240, 98, 146, 0.15);
      color: var(--accent-liqz);
      border: 1.5px solid var(--accent-liqz);
      transition: background 0.25s, border-color 0.25s, color 0.25s;
    }
    #bar label { display: flex; flex-direction: column; font-size: 11px; gap: 2px; color: var(--text-secondary); }
    #bar label .speed-eta { font-size: 10px; color: var(--text-muted); margin-top: 1px; max-width: 140px; }
    #bar input[type="range"] {
      width: 130px;
      accent-color: var(--accent-liqz);
      height: 4px;
    }
    button {
      padding: 7px 18px;
      border-radius: 8px;
      border: none;
      background: linear-gradient(135deg, #e91e63, #c2185b);
      color: #fff;
      cursor: pointer;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.04em;
      transition: filter 0.18s, transform 0.12s;
      box-shadow: 0 2px 8px rgba(233, 30, 99, 0.35);
    }
    button:hover { filter: brightness(1.15); transform: translateY(-1px); }
    button:active { filter: brightness(0.95); transform: translateY(0); }
    button.secondary {
      background: var(--bg-card-solid);
      color: var(--text-secondary);
      box-shadow: 0 2px 6px rgba(0,0,0,0.25);
      border: 1px solid var(--border-subtle);
    }
    button.secondary:hover { color: #fff; border-color: rgba(120,155,195,0.45); }
    .hint {
      font-size: 11px;
      color: var(--text-muted);
      max-width: min(520px, 94vw);
      line-height: 1.4;
    }
    #vizWrap {
      flex: 1;
      min-height: 0;
      min-width: 0;
      display: flex;
      flex-direction: column;
    }
    #mapStage {
      flex: 1;
      min-height: 0;
      position: relative;
      overflow: hidden;
      background: #0b1220;
    }
    #map {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border-radius: 0;
    }
    .leaflet-container {
      background: #0f1a2e !important;
      border-radius: 0;
    }
    .leaflet-control-attribution { background: rgba(15,25,40,0.72) !important; color: #6a8099 !important; font-size: 10px !important; }
    .leaflet-control-attribution a { color: #7eb8e8 !important; }
    /* ── Poem Dock (deep-refined glass card) ── */
    #poemDock {
      position: absolute;
      z-index: 1000;
      right: clamp(12px, 2.4vw, 26px);
      top: clamp(72px, 10vmin, 110px);
      bottom: 36px;
      left: auto;
      height: fit-content;
      margin-top: auto;
      margin-bottom: auto;
      width: auto;
      min-width: min(9.5rem, calc(100% - 20px));
      max-width: min(280px, calc(100% - 20px));
      transform: translateY(12px);
      opacity: 0;
      visibility: hidden;
      display: flex;
      flex-direction: column;
      padding: 14px 16px 16px;
      background: rgba(16, 22, 36, 0.92);
      border: 1px solid var(--border-accent);
      border-radius: 14px;
      box-shadow:
        0 0 0 1px rgba(240, 98, 146, 0.08),
        0 10px 40px rgba(0, 0, 0, 0.45),
        0 1px 0 rgba(255, 255, 255, 0.06) inset;
      backdrop-filter: blur(16px) saturate(1.3);
      -webkit-backdrop-filter: blur(16px) saturate(1.3);
      font-family: "Kaiti SC", "STKaiti", "KaiTi", "Songti SC", serif;
      overflow: hidden;
      pointer-events: auto;
      box-sizing: border-box;
      transition: opacity 0.45s cubic-bezier(0.22, 1, 0.36, 1), transform 0.45s cubic-bezier(0.22, 1, 0.36, 1), visibility 0s 0.45s;
    }
    #poemDock.is-visible {
      visibility: visible;
      opacity: 1;
      transform: translateY(0);
      transition: opacity 0.45s cubic-bezier(0.22, 1, 0.36, 1), transform 0.45s cubic-bezier(0.22, 1, 0.36, 1), visibility 0s;
    }
    #poemDock .poem-scroll {
      overflow-y: auto;
      overflow-x: hidden;
      max-width: 100%;
      max-height: min(52vmin, 52vh, 480px);
      -webkit-overflow-scrolling: touch;
      padding-right: 4px;
      scrollbar-width: thin;
      scrollbar-color: rgba(240,98,146,0.25) transparent;
    }
    #poemDock .poem-scroll::-webkit-scrollbar { width: 4px; }
    #poemDock .poem-scroll::-webkit-scrollbar-thumb { background: rgba(240,98,146,0.3); border-radius: 4px; }
    #poemDock .poem-era {
      font-size: 11px;
      font-weight: 700;
      color: var(--accent-liqz);
      letter-spacing: 0.06em;
      margin-bottom: 6px;
      font-family: system-ui, sans-serif;
      flex-shrink: 0;
      text-transform: none;
    }
    #poemDock .poem-title {
      font-size: 16px;
      font-weight: 800;
      color: #e1bee7;
      margin-bottom: 10px;
      line-height: 1.4;
      flex-shrink: 0;
      max-width: 100%;
      text-shadow: 0 0 12px rgba(240, 98, 146, 0.25);
    }
    #poemDock .poem-body {
      font-size: 14.5px;
      line-height: 2;
      color: rgba(230, 225, 240, 0.92);
      white-space: pre-wrap;
      word-break: keep-all;
      max-width: 100%;
      letter-spacing: 0.04em;
    }
    /* ── Phase HUD (top card) ── */
    #phaseHud {
      position: absolute;
      z-index: 1050;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: min(560px, 92vw);
      padding: 12px 18px;
      background: var(--bg-card);
      border-radius: 12px;
      border: 1px solid var(--border-subtle);
      box-shadow: 0 6px 28px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(120,155,195,0.06);
      pointer-events: none;
      display: grid;
      grid-template-columns: 5.5rem minmax(0, 1fr);
      column-gap: 14px;
      align-items: start;
      font-family: "Kaiti SC", "STKaiti", "KaiTi", serif;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    #phaseHud .hist-year-chip {
      width: 100%;
      padding: 9px 8px;
      border-radius: 999px;
      background: linear-gradient(145deg, rgba(240,98,146,0.18), rgba(240,98,146,0.06));
      border: 1px solid rgba(240, 98, 146, 0.3);
      font-size: 19px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      color: #fff;
      text-align: center;
      line-height: 1.2;
      text-shadow: 0 0 8px rgba(240,98,146,0.35);
    }
    #phaseHud .phase-body strong {
      display: block;
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 2px;
    }
    #phaseHud .phase-body .phase-sub {
      font-size: 13.5px;
      color: var(--text-secondary);
      line-height: 1.5;
    }
    /* 有诗词时收窄顶卡 */
    #mapStage.has-poem-dock #phaseHud {
      width: min(560px, max(220px, calc(100% - clamp(200px, 30vw, 310px))));
      max-width: min(560px, max(220px, calc(100% - clamp(200px, 30vw, 310px))));
    }
    #err {
      display: none;
      margin: 10px 14px;
      padding: 10px;
      background: rgba(198, 40, 40, 0.15);
      color: #ff8a80;
      border-radius: 8px;
      border: 1px solid rgba(198, 40, 40, 0.35);
    }
  </style>
</head>
<body>
  <div class="toplink"><a href="index.html">← 返回主图</a> · 三人按时代先后连续播放（李白 → 苏轼 → 李清照）</div>
  <div id="err"></div>
  <div id="bar">
    <span id="yearLabel">701 年</span>
    <span id="poetBadge">李白</span>
    <button type="button" id="btnPlay">播放</button>
    <button type="button" class="secondary" id="btnReset">重置</button>
    <label>进度<input type="range" id="rngProgress" min="0" max="1000" value="0" /></label>
    <label>年速<input type="range" id="rngSpeed" min="1" max="45" value="4" /><span id="speedEta" class="speed-eta" aria-live="polite"></span></label>
    <span class="hint">迁移与事迹见上方卡片。李清照全词叠在地图右侧（约 8–14 秒）；仅当后面还有下一首时暂停时间轴。底图叠加 CHGIS Hartwell 朝代外廓。拖拽进度可回看。</span>
  </div>
  <div id="vizWrap">
    <div id="mapStage">
      <div id="phaseHud" aria-live="polite">
        <div class="hist-year-chip" id="phaseYearChip">701</div>
        <div class="phase-body">
          <strong id="phasePoetTitle">李白</strong>
          <span class="phase-sub" id="phaseSub">行迹编年</span>
        </div>
      </div>
      <div id="map"></div>
      <aside id="poemDock" aria-live="polite" aria-label="李清照作品"></aside>
    </div>
  </div>
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="vip-path-trilogy.js"></script>
</body>
</html>
